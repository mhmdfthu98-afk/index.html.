<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MORRE STORE | إيداع Binance</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="../css/main.css">
    <style>
        .deposit-info {
            background: var(--white);
            border-radius: var(--radius);
            padding: 20px;
            margin: 16px 0;
            box-shadow: var(--shadow);
        }
        .account-detail {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0;
            border-bottom: 1px solid rgba(0, 0, 0, 0.04);
        }
        .account-detail:last-child {
            border-bottom: none;
        }
        .account-detail .label {
            color: var(--gray);
            font-weight: 600;
            font-size: 0.85rem;
        }
        .account-detail .value {
            font-weight: 800;
            color: var(--dark);
            font-size: 1rem;
        }
        .copy-btn {
            background: none;
            border: none;
            color: var(--primary);
            cursor: pointer;
            font-size: 1.1rem;
        }
        .form-group {
            margin-bottom: 14px;
        }
        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 0.8rem;
            color: var(--gray);
            margin-bottom: 4px;
        }
        .form-group input {
            width: 100%;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid rgba(0, 0, 0, 0.04);
            background: var(--white);
            font-size: 0.95rem;
            transition: var(--transition);
            font-family: 'Cairo', sans-serif;
        }
        .form-group input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(245, 158, 11, 0.1);
        }
        .upload-area {
            border: 2px dashed rgba(0, 0, 0, 0.04);
            border-radius: 12px;
            padding: 20px;
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--white);
        }
        .upload-area:hover {
            border-color: var(--primary);
            background: rgba(245, 158, 11, 0.02);
        }
        .upload-area i {
            font-size: 2rem;
            color: var(--gray);
            display: block;
            margin-bottom: 8px;
        }
        .upload-area p {
            color: var(--gray);
            font-size: 0.85rem;
        }
        #previewImage {
            max-width: 100%;
            max-height: 200px;
            margin-top: 10px;
            border-radius: 8px;
            display: none;
        }
        .btn-primary {
            width: 100%;
            padding: 14px;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <div class="container">
        <header class="page-header">
            <a href="../wallet.html" class="back-btn"><i class="fas fa-arrow-right"></i> رجوع</a>
            <div class="page-title">🟡 إيداع Binance</div>
        </header>

        <div class="deposit-info">
            <div class="account-detail">
                <span class="label">📋 UID</span>
                <span class="value" id="accountNumber">1206604367</span>
                <button class="copy-btn" onclick="copyText('accountNumber')"><i class="fas fa-copy"></i></button>
            </div>
            <div class="account-detail">
                <span class="label">👤 الاسم المستعار</span>
                <span class="value">MORRE STORE</span>
            </div>
            <div class="account-detail">
                <span class="label">🟡 المنصة</span>
                <span class="value">Binance</span>
            </div>
        </div>

        <form id="depositForm">
            <div class="form-group">
                <label>💰 المبلغ (ج.س)</label>
                <input type="number" id="amount" placeholder="أدخل المبلغ" min="1" required>
            </div>
            <div class="form-group">
                <label>📝 رقم العملية</label>
                <input type="text" id="reference" placeholder="رقم العملية من التطبيق">
            </div>
            <div class="form-group">
                <label>📎 إثبات الدفع</label>
                <div class="upload-area" onclick="document.getElementById('proof').click()">
                    <i class="fas fa-cloud-upload-alt"></i>
                    <p>اضغط لرفع صورة إثبات الدفع</p>
                    <input type="file" id="proof" accept="image/*" style="display:none;" onchange="previewImage(this)">
                    <img id="previewImage" alt="معاينة الصورة">
                </div>
            </div>
            <button type="submit" class="btn-primary"><i class="fas fa-paper-plane"></i> إرسال طلب الإيداع</button>
        </form>
    </div>

    <div id="toast" class="toast"></div>

    <script>
        function copyText(id) {
            const text = document.getElementById(id).textContent;
            navigator.clipboard.writeText(text).then(() => showToast('✅ تم نسخ UID'));
        }

        function previewImage(input) {
            const preview = document.getElementById('previewImage');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    preview.src = e.target.result;
                    preview.style.display = 'block';
                }
                reader.readAsDataURL(input.files[0]);
            }
        }

        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }

        document.getElementById('depositForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const amount = document.getElementById('amount').value;
            if (!amount || amount < 1) {
                showToast('❌ أدخل مبلغ صحيح');
                return;
            }
            showToast('✅ تم إرسال طلب الإيداع بنجاح! جاري المراجعة');
            setTimeout(() => window.location.href = '../wallet.html', 2000);
        });
    </script>
</body>
</html>
