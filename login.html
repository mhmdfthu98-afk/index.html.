<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MORRE STORE | تسجيل الدخول</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
    <style>
        * {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #fef08a 0%, #fde047 30%, #fef9c3 60%, #fef08a 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .auth-container {
            width: 100%;
            max-width: 480px;
            margin: 0 auto;
        }
        .auth-card {
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(20px);
            border-radius: 32px;
            padding: 32px 28px;
            border: 1px solid rgba(255, 255, 255, 0.3);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.08);
        }
        .auth-card .logo {
            text-align: center;
            margin-bottom: 20px;
        }
        .auth-card .logo img {
            width: 80px;
            height: 80px;
            border-radius: 20px;
            margin-bottom: 8px;
        }
        .auth-card .logo h1 {
            font-size: 2rem;
            font-weight: 900;
            color: #1e293b;
            letter-spacing: -1px;
        }
        .auth-card .logo h1 span {
            background: linear-gradient(135deg, #f59e0b, #d97706);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .auth-card .logo p {
            color: #64748b;
            font-size: 0.8rem;
            margin-top: 2px;
        }
        .auth-card .welcome {
            text-align: center;
            margin-bottom: 24px;
        }
        .auth-card .welcome h2 {
            font-size: 1.3rem;
            font-weight: 800;
            color: #1e293b;
        }
        .auth-card .welcome p {
            color: #94a3b8;
            font-size: 0.85rem;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-weight: 700;
            font-size: 0.8rem;
            color: #1e293b;
            margin-bottom: 4px;
        }
        .form-group .input-wrapper {
            position: relative;
        }
        .form-group .input-wrapper i {
            position: absolute;
            right: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 1rem;
        }
        .form-group input {
            width: 100%;
            padding: 12px 44px 12px 16px;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.6);
            font-size: 0.9rem;
            transition: 0.2s;
            font-family: 'Cairo', sans-serif;
            color: #1e293b;
        }
        .form-group input:focus {
            outline: none;
            border-color: #f59e0b;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 4px rgba(245, 158, 11, 0.1);
        }
        .form-group input::placeholder {
            color: #94a3b8;
        }
        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 12px 0 20px;
        }
        .form-options .remember {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: #1e293b;
            cursor: pointer;
        }
        .form-options .remember input[type="checkbox"] {
            width: 16px;
            height: 16px;
            accent-color: #f59e0b;
            cursor: pointer;
        }
        .form-options .forgot {
            font-size: 0.8rem;
            color: #f59e0b;
            text-decoration: none;
            font-weight: 700;
        }
        .form-options .forgot:hover {
            color: #d97706;
        }
        .btn-login {
            width: 100%;
            padding: 14px;
            border-radius: 14px;
            border: none;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-size: 1rem;
            font-weight: 800;
            cursor: pointer;
            transition: 0.3s;
            font-family: 'Cairo', sans-serif;
        }
        .btn-login:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 30px rgba(245, 158, 11, 0.35);
        }
        .btn-login:active {
            transform: scale(0.97);
        }
        .divider {
            display: flex;
            align-items: center;
            gap: 16px;
            margin: 20px 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e2e8f0;
        }
        .divider span {
            color: #94a3b8;
            font-size: 0.8rem;
            font-weight: 600;
            white-space: nowrap;
        }
        .social-login {
            display: flex;
            gap: 12px;
            justify-content: center;
        }
        .social-login .social-btn {
            flex: 1;
            padding: 12px;
            border-radius: 14px;
            border: 2px solid #e2e8f0;
            background: rgba(255, 255, 255, 0.5);
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            font-weight: 700;
            font-size: 0.85rem;
            color: #1e293b;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            font-family: 'Cairo', sans-serif;
        }
        .social-login .social-btn:hover {
            border-color: #f59e0b;
            background: rgba(255, 255, 255, 0.8);
            transform: translateY(-2px);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.05);
        }
        .social-login .social-btn i {
            font-size: 1.2rem;
        }
        .social-login .social-btn.google i {
            color: #ea4335;
        }
        .social-login .social-btn.apple i {
            color: #1e293b;
        }
        .social-login .social-btn.facebook i {
            color: #1877f2;
        }
        .auth-footer {
            text-align: center;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #64748b;
        }
        .auth-footer a {
            color: #f59e0b;
            font-weight: 700;
            text-decoration: none;
        }
        .auth-footer a:hover {
            color: #d97706;
        }
        .features {
            display: flex;
            justify-content: center;
            gap: 24px;
            margin-top: 20px;
            padding-top: 16px;
            border-top: 1px solid #e2e8f0;
        }
        .features .feature {
            text-align: center;
        }
        .features .feature i {
            font-size: 1.2rem;
            color: #f59e0b;
            display: block;
            margin-bottom: 2px;
        }
        .features .feature span {
            font-size: 0.6rem;
            color: #94a3b8;
            font-weight: 600;
        }
        .features .feature .num {
            font-size: 0.7rem;
            font-weight: 900;
            color: #1e293b;
        }

        /* Dark Mode */
        .dark body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .dark .auth-card {
            background: rgba(30, 41, 59, 0.8);
            border-color: rgba(255, 255, 255, 0.05);
        }
        .dark .auth-card .logo h1 {
            color: #f1f5f9;
        }
        .dark .auth-card .welcome h2 {
            color: #f1f5f9;
        }
        .dark .auth-card .welcome p {
            color: #94a3b8;
        }
        .dark .form-group label {
            color: #f1f5f9;
        }
        .dark .form-group input {
            background: rgba(15, 23, 42, 0.6);
            border-color: #334155;
            color: #f1f5f9;
        }
        .dark .form-group input:focus {
            border-color: #f59e0b;
            background: rgba(15, 23, 42, 0.8);
        }
        .dark .form-group input::placeholder {
            color: #64748b;
        }
        .dark .form-options .remember {
            color: #f1f5f9;
        }
        .dark .divider::before,
        .dark .divider::after {
            background: #334155;
        }
        .dark .divider span {
            color: #64748b;
        }
        .dark .social-login .social-btn {
            border-color: #334155;
            background: rgba(15, 23, 42, 0.4);
            color: #f1f5f9;
        }
        .dark .social-login .social-btn:hover {
            border-color: #f59e0b;
            background: rgba(15, 23, 42, 0.6);
        }
        .dark .social-login .social-btn.apple i {
            color: #f1f5f9;
        }
        .dark .auth-footer {
            color: #94a3b8;
        }
        .dark .features .feature .num {
            color: #f1f5f9;
        }
        .dark .features {
            border-top-color: #334155;
        }

        @media (max-width: 480px) {
            .auth-card {
                padding: 24px 16px;
                border-radius: 24px;
            }
            .auth-card .logo img {
                width: 60px;
                height: 60px;
            }
            .auth-card .logo h1 {
                font-size: 1.6rem;
            }
            .social-login {
                flex-direction: column;
            }
            .features {
                flex-wrap: wrap;
                gap: 12px;
            }
        }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="auth-card">

            <!-- ===== الشعار مع اللوغو ===== -->
            <div class="logo">
                <img src="https://i.postimg.cc/T2jF7JFz/Black-And-White-Illustrative-Gaming-Logo-20260610-185928-0000.png" alt="MORRE STORE Logo">
                <h1><span>MORRE</span> STORE</h1>
                <p>شحن سريع وآمن</p>
            </div>

            <!-- ===== الترحيب ===== -->
            <div class="welcome">
                <h2>👋 مرحباً بك مجدداً</h2>
                <p>سجل دخولك للوصول إلى حسابك</p>
            </div>

            <!-- ===== نموذج تسجيل الدخول ===== -->
            <form id="loginForm" onsubmit="return handleLogin(event)">

                <div class="form-group">
                    <label>البريد الإلكتروني أو رقم الجوال</label>
                    <div class="input-wrapper">
                        <i class="fas fa-envelope"></i>
                        <input type="email" id="loginEmail" placeholder="example@email.com" required>
                    </div>
                </div>

                <div class="form-group">
                    <label>كلمة المرور</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" id="loginPassword" placeholder="أدخل كلمة المرور" required>
                    </div>
                </div>

                <div class="form-options">
                    <label class="remember">
                        <input type="checkbox" id="rememberMe"> تذكرني
                    </label>
                    <a href="#" class="forgot" onclick="showToast('📧 سيتم إرسال رابط إعادة تعيين كلمة المرور إلى بريدك الإلكتروني')">هل نسيت كلمة المرور؟</a>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول
                </button>

            </form>

            <div class="divider">
                <span>أو تسجيل الدخول باستخدام</span>
            </div>

            <div class="social-login">
                <button class="social-btn google" onclick="socialLogin('google')">
                    <i class="fab fa-google"></i> Google
                </button>
                <button class="social-btn apple" onclick="showToast('🍎 سيتم إضافة تسجيل الدخول عبر Apple قريباً')">
                    <i class="fab fa-apple"></i> Apple
                </button>
                <button class="social-btn facebook" onclick="showToast('📘 سيتم إضافة تسجيل الدخول عبر Facebook قريباً')">
                    <i class="fab fa-facebook"></i> Facebook
                </button>
            </div>

            <div class="auth-footer">
                ليس لديك حساب؟ <a href="#" onclick="window.location.href='register.html'">إنشاء حساب جديد</a>
            </div>

            <div class="features">
                <div class="feature">
                    <i class="fas fa-headset"></i>
                    <span class="num">24/7</span>
                    <span>دعم فني</span>
                </div>
                <div class="feature">
                    <i class="fas fa-shield-alt"></i>
                    <span class="num">100%</span>
                    <span>دفع آمن</span>
                </div>
                <div class="feature">
                    <i class="fas fa-bolt"></i>
                    <span class="num">⚡</span>
                    <span>تسليم فوري</span>
                </div>
            </div>

        </div>
    </div>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast"></div>

    <style>
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-size: 0.85rem;
            font-weight: 600;
            z-index: 999999;
            opacity: 0;
            transition: all 0.3s ease;
            pointer-events: none;
            white-space: nowrap;
            box-shadow: 0 8px 30px rgba(0, 0, 0, 0.15);
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
        .dark .toast {
            background: #f1f5f9;
            color: #1e293b;
        }
    </style>

    <script type="module">
        // ========== Firebase ==========
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, getDoc, setDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC0jzecEwKgHpxHpTi8Y-_bwwfzVdtgf3E",
            authDomain: "khasmshop.firebaseapp.com",
            projectId: "khasmshop",
            storageBucket: "khasmshop.firebasestorage.app",
            messagingSenderId: "238182001615",
            appId: "1:238182001615:web:d77391030a40a481b440ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const provider = new GoogleAuthProvider();

        // ===== Toast =====
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }
        window.showToast = showToast;

        // ===== تسجيل الدخول =====
        window.handleLogin = async function(e) {
            e.preventDefault();

            const email = document.getElementById('loginEmail').value.trim();
            const password = document.getElementById('loginPassword').value;
            const btn = document.getElementById('loginBtn');

            if (!email || !password) {
                showToast('❌ الرجاء إدخال البريد الإلكتروني وكلمة المرور');
                return false;
            }

            btn.innerHTML = '<i class="fas fa-spinner fa-spin ml-2"></i> جاري تسجيل الدخول...';
            btn.disabled = true;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                showToast('✅ تم تسجيل الدخول بنجاح!');
                setTimeout(() => {
                    window.location.href = 'index.html';
                }, 1000);
            } catch (error) {
                let msg = '❌ حدث خطأ في تسجيل الدخول';
                if (error.code === 'auth/user-not-found') msg = '❌ هذا البريد الإلكتروني غير مسجل';
                else if (error.code === 'auth/wrong-password') msg = '❌ كلمة المرور غير صحيحة';
                else if (error.code === 'auth/invalid-email') msg = '❌ البريد الإلكتروني غير صحيح';
                else if (error.code === 'auth/too-many-requests') msg = '❌ تم إيقاف الحساب مؤقتاً. حاول لاحقاً';
                showToast(msg);
            } finally {
                btn.innerHTML = '<i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول';
                btn.disabled = false;
            }

            return false;
        };

        // ===== تسجيل الدخول بجوجل =====
        window.socialLogin = async function(providerName) {
            if (providerName === 'google') {
                try {
                    const result = await signInWithPopup(auth, provider);
                    const user = result.user;

                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);

                    if (!userSnap.exists()) {
                        const walletID = Math.floor(100000 + Math.random() * 900000).toString();
                        await setDoc(userRef, {
                            name: user.displayName || user.email.split('@')[0],
                            email: user.email,
                            img: user.photoURL || 'https://via.placeholder.com/100',
                            walletID: walletID,
                            balance: 0,
                            createdAt: serverTimestamp()
                        });
                        showToast(`✅ مرحباً! رقم محفظتك: #${walletID}`);
                    }

                    showToast('✅ تم تسجيل الدخول بنجاح!');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                } catch (error) {
                    showToast('❌ حدث خطأ في تسجيل الدخول بجوجل');
                }
            }
        };

        // ===== التحقق من حالة المستخدم =====
        onAuthStateChanged(auth, (user) => {
            if (user) {
                window.location.href = 'index.html';
            }
        });

        // ===== الوضع الليلي =====
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }

        console.log('🔐 MORRE STORE - Login Page Loaded');
    </script>

</body>
</html>
