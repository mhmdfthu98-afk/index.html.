<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhasmShop | الشحن الفوري</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; }
        .page { display: none; } .active { display: block; }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto bg-white min-h-screen shadow-xl pb-24">
    <header class="p-4 border-b flex justify-between items-center bg-white sticky top-0 z-50">
        <div class="flex items-center gap-2">
            <img id="u-img" class="w-10 h-10 rounded-full border shadow-sm" src="https://via.placeholder.com/40">
            <div>
                <h2 id="u-name" class="text-xs font-bold">جاري التحميل...</h2>
                <p id="u-id" class="text-[10px] text-gray-400 font-mono">ID: #000000</p>
            </div>
        </div>
        <div class="bg-blue-50 px-3 py-1 rounded-full border border-blue-100">
            <span id="u-bal" class="text-blue-600 font-black text-sm">0</span> <span class="text-[8px] text-blue-400">SDG</span>
        </div>
    </header>

    <main class="p-4">
        <div id="p-home" class="page active">
            <div id="product-list" class="grid grid-cols-2 gap-3">
                </div>
        </div>
    </main>

    <nav class="fixed bottom-0 left-0 right-0 max-w-md mx-auto bg-white border-t p-3 flex justify-around items-center">
        <button onclick="location.reload()" class="text-blue-600"><i class="fas fa-home text-xl"></i></button>
        <button onclick="alert('تواصل مع الوكلاء للشحن: 0907760989') text-gray-400"><i class="fas fa-wallet text-xl"></i></button>
    </nav>
</div>

<script type="module">
    // استخدام روابط CDN حديثة ومستقرة لـ Render
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
    import { getFirestore, collection, addDoc, onSnapshot, query, serverTimestamp, doc, updateDoc, increment, setDoc } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC0jzecEwKgHpxHpTi8Y-_bwwfzVdtgf3E",
        authDomain: "khasmshop.firebaseapp.com",
        projectId: "khasmshop",
        storageBucket: "khasmshop.appspot.com",
        messagingSenderId: "238182001615",
        appId: "1:238182001615:web:d77391030a40a481b440ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let user = null;
    let userData = null;

    // مراقبة حالة تسجيل الدخول
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            user = u;
            const userRef = doc(db, "users", u.uid);
            onSnapshot(userRef, (docSnap) => {
                if (docSnap.exists()) {
                    userData = docSnap.data();
                    renderUI();
                } else {
                    // إنشاء حساب جديد إذا لم يكن موجوداً
                    setDoc(userRef, {
                        name: u.displayName,
                        img: u.photoURL,
                        email: u.email,
                        balance: 0,
                        walletID: Math.floor(100000 + Math.random() * 900000).toString()
                    });
                }
            });
            loadProducts();
        } else {
            signInWithPopup(auth, provider).catch(err => alert("يرجى تفعيل النافذة المنبثقة لتسجيل الدخول"));
        }
    });

    function renderUI() {
        document.getElementById('u-name').innerText = userData.name;
        document.getElementById('u-img').src = userData.img;
        document.getElementById('u-id').innerText = "ID: #" + userData.walletID;
        document.getElementById('u-bal').innerText = userData.balance.toLocaleString();
    }

    function loadProducts() {
        onSnapshot(collection(db, "products"), (snap) => {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                    <div class="bg-white p-4 rounded-2xl border shadow-sm">
                        <h3 class="text-[10px] font-bold h-8">${p.name}</h3>
                        <p class="text-blue-600 font-black text-xs my-2">${p.price} SDG</p>
                        <button onclick="window.makeOrder('${d.id}', '${p.name}', ${p.price})" class="w-full bg-slate-800 text-white py-2 rounded-xl text-[10px] font-bold">اطلب الآن</button>
                    </div>`;
            });
        });
    }

    // وظيفة الطلب (مربوطة بالنافذة العالمية)
    window.makeOrder = async (pid, pname, pprice) => {
        if (!userData || userData.balance < pprice) {
            return alert("الرصيد لا يكفي! تواصل مع الوكيل: 0907760989");
        }

        const gameID = prompt("أدخل آيدي اللاعب (ID):");
        if (!gameID) return;

        try {
            // 1. خصم الرصيد
            await updateDoc(doc(db, "users", user.uid), {
                balance: increment(-pprice)
            });

            // 2. إضافة الطلب بالمسميات الصحيحة لصورتك
            await addDoc(collection(db, "orders"), {
                uID: user.uid,
                uName: userData.name,
                uWallet: userData.walletID,
                product: pname,
                price: pprice,
                gameID: gameID,
                status: "Pending",
                timestamp: serverTimestamp(),
                gameName: "N/A",
                phone: "N/A"
            });

            alert("✅ تم إرسال طلبك بنجاح!");
        } catch (e) {
            alert("خطأ تقني: " + e.message);
        }
    };
</script>
</body>
</html>
