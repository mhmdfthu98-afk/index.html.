<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhasmShop VIP | Ultra Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* CSS - الجزء الأول (350 سطر تقريباً من التأثيرات) */
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        
        :root {
            --primary: #0f172a;
            --accent: #fbbf24;
            --glass: rgba(255, 255, 255, 0.03);
            --gradient: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: #020617;
            color: #f8fafc;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
            overflow-x: hidden;
        }

        /* تحسينات التصميم */
        .glass-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(15px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 30px;
        }

        .vip-card {
            background: var(--gradient);
            border: 1px solid rgba(251, 191, 36, 0.3);
            position: relative;
            overflow: hidden;
        }

        .vip-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(251, 191, 36, 0.15) 0%, transparent 70%);
            animation: rotate 10s linear infinite;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        /* التبويبات والصفحات */
        .page { display: none; opacity: 0; transform: translateY(20px); transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        .nav-bar {
            position: fixed;
            bottom: 25px;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            max-width: 400px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 10px;
            z-index: 1000;
            display: flex;
            justify-content: space-around;
            box-shadow: 0 20px 50px rgba(0,0,0,0.5);
        }

        .nav-item {
            padding: 12px;
            border-radius: 25px;
            color: #64748b;
            transition: 0.3s;
        }

        .nav-item.active {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.1);
        }

        /* أزرار مخصصة */
        .btn-premium {
            background: linear-gradient(90deg, #fbbf24, #f59e0b);
            color: #000;
            font-weight: 900;
            transition: 0.3s;
            box-shadow: 0 10px 20px rgba(251, 191, 36, 0.2);
        }

        .btn-premium:active { transform: scale(0.95); }

        /* حقول الإدخال */
        input, select {
            background: rgba(255,255,255,0.05) !important;
            border: 1px solid rgba(255,255,255,0.1) !important;
            color: white !important;
            border-radius: 15px !important;
            padding: 15px !important;
        }

        /* أنيميشن التحميل */
        .loader {
            width: 50px;
            height: 50px;
            border: 5px solid #1e293b;
            border-top: 5px solid #fbbf24;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* قسم الاشتراكات المستقل */
        .sub-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 20px;
        }

        .sub-item {
            background: linear-gradient(135deg, rgba(59, 130, 246, 0.1) 0%, rgba(37, 99, 235, 0.1) 100%);
            border: 1px solid rgba(59, 130, 246, 0.3);
            border-radius: 25px;
            padding: 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto min-h-screen relative pb-32">
    
    <header class="p-6 flex justify-between items-center sticky top-0 z-50 bg-[#020617]/80 backdrop-blur-md">
        <div class="flex items-center gap-4">
            <div class="relative">
                <img id="u-img" src="https://via.placeholder.com/100" class="w-14 h-14 rounded-2xl border-2 border-amber-400 object-cover shadow-lg shadow-amber-500/20">
                <span class="absolute -top-1 -right-1 bg-green-500 w-4 h-4 rounded-full border-2 border-[#020617]"></span>
            </div>
            <div>
                <h2 id="u-name" class="font-black text-sm italic">جاري التحميل...</h2>
                <div class="flex items-center gap-2">
                    <span id="u-id" class="text-[10px] text-slate-400 font-mono">ID: #------</span>
                    <button onclick="copyID()" class="text-[9px] bg-white/5 p-1 rounded"><i class="far fa-copy"></i></button>
                </div>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleModal('agents-modal')" class="w-11 h-11 glass-card flex items-center justify-center text-green-400"><i class="fab fa-whatsapp text-xl"></i></button>
            <button onclick="showPage('p-redeem')" class="w-11 h-11 glass-card flex items-center justify-center text-amber-400"><i class="fas fa-crown"></i></button>
        </div>
    </header>

    <main class="px-6 space-y-8">
        
        <section id="p-home" class="page active space-y-6">
            <div class="vip-card p-8 rounded-[40px] shadow-2xl">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold text-amber-400 tracking-[3px] uppercase mb-1">الرصيد المتاح</p>
                    <div class="flex items-baseline gap-2">
                        <span id="u-bal" class="text-5xl font-black italic tracking-tighter">0</span>
                        <span class="text-xs font-bold opacity-50">SDG</span>
                    </div>
                    <div class="mt-8 grid grid-cols-2 gap-4 border-t border-white/10 pt-6">
                        <div>
                            <p class="text-[9px] text-slate-400 font-bold mb-1">نقاط المكافآت</p>
                            <p class="text-lg font-black"><span id="u-pts">0</span> <i class="fas fa-gem text-amber-400 text-xs"></i></p>
                        </div>
                        <div>
                            <p class="text-[9px] text-slate-400 font-bold mb-1">عضوية المتجر</p>
                            <p id="u-sub" class="text-[11px] font-black text-blue-400">حساب عادي</p>
                        </div>
                    </div>
                </div>
            </div>

            <div class="space-y-4">
                <div class="flex justify-between items-center px-2">
                    <h3 class="font-black text-sm">أقسام الشحن</h3>
                    <div class="flex gap-2">
                        <button onclick="loadProducts('PUBG')" class="cat-btn text-[10px] font-black px-4 py-2 rounded-full glass-card active">PUBG</button>
                        <button onclick="loadProducts('FREEFIRE')" class="cat-btn text-[10px] font-black px-4 py-2 rounded-full glass-card">FF</button>
                    </div>
                </div>
                <div id="product-list" class="grid grid-cols-2 gap-4"></div>
            </div>

            <div class="space-y-4 pt-4 border-t border-white/5">
                <h3 class="font-black text-sm text-blue-400 italic"><i class="fas fa-star mr-1"></i> باقات الاشتراكات (برايم)</h3>
                <div id="subs-list" class="sub-grid"></div>
            </div>
        </section>

        <section id="p-admin" class="page space-y-6">
            <h3 class="text-xl font-black italic underline decoration-amber-400">لوحة إدارة الوزارة</h3>
            
            <div class="glass-card p-6 space-y-4">
                <p class="text-xs font-bold text-amber-400"><i class="fas fa-search mr-1"></i> البحث عن محفظة زبون</p>
                <div class="flex gap-2">
                    <input id="search-uid" type="number" placeholder="رقم المحفظة (6 أرقام)" class="flex-1">
                    <button onclick="findUser()" class="btn-premium px-6 rounded-xl text-xs">بحث</button>
                </div>
                <div id="user-info" class="hidden p-4 bg-white/5 rounded-2xl border border-white/10 flex justify-between items-center">
                    <div class="flex items-center gap-3">
                        <img id="target-img" class="w-10 h-10 rounded-xl" src="">
                        <p id="target-name" class="text-xs font-black"></p>
                    </div>
                    <button onclick="addCash()" class="bg-green-500 text-black text-[10px] px-4 py-2 rounded-lg font-black">شحن</button>
                </div>
            </div>

            <div class="flex gap-2 bg-white/5 p-1 rounded-2xl">
                <button onclick="switchAdminTab('orders', this)" class="adm-tab flex-1 bg-amber-400 text-black py-3 rounded-xl text-[10px] font-black">الطلبات</button>
                <button onclick="switchAdminTab('manage', this)" class="adm-tab flex-1 py-3 rounded-xl text-[10px] font-black">إدارة المتجر</button>
            </div>

            <div id="adm-orders" class="space-y-4"></div>
            <div id="adm-manage" class="hidden space-y-6">
                <div class="glass-card p-6 space-y-4">
                    <input id="p-name" type="text" placeholder="اسم المنتج/الاشتراك">
                    <div class="flex gap-2">
                        <input id="p-price" type="number" placeholder="السعر">
                        <input id="p-pts" type="number" placeholder="النقاط">
                    </div>
                    <select id="p-cat" class="w-full">
                        <option value="PUBG">قسم PUBG</option>
                        <option value="FREEFIRE">قسم Free Fire</option>
                        <option value="SUBS">قسم الاشتراكات (SUBS)</option>
                    </select>
                    <button onclick="addProduct()" class="w-full btn-premium py-4 rounded-2xl text-xs">إضافة للمتجر الآن</button>
                </div>
                <div id="adm-list" class="space-y-2"></div>
            </div>
        </section>

        <section id="p-redeem" class="page space-y-6 text-center">
            <h3 class="text-2xl font-black italic">متجر <span class="text-amber-400">الجواهر</span></h3>
            <div id="redeem-list" class="space-y-4"></div>
        </section>

    </main>

    <nav class="nav-bar">
        <button onclick="showPage('p-home', this)" class="nav-item active"><i class="fas fa-home text-xl"></i></button>
        <button onclick="showPage('p-redeem', this)" class="nav-item"><i class="fas fa-gift text-xl"></i></button>
        <button id="admin-nav" onclick="showPage('p-admin', this)" class="nav-item hidden"><i class="fas fa-user-shield text-xl"></i></button>
        <button onclick="toggleModal('agents-modal')" class="nav-item"><i class="fab fa-whatsapp text-xl"></i></button>
    </nav>
</div>

<div id="agents-modal" class="hidden fixed inset-0 bg-black/90 backdrop-blur-md z-[2000] flex items-end">
    <div class="bg-[#0f172a] w-full rounded-t-[50px] p-10 space-y-6 border-t border-amber-400/30">
        <div class="w-16 h-1 bg-slate-700 mx-auto rounded-full"></div>
        <h3 class="text-center font-black text-xl italic text-amber-400">الوكلاء المعتمدين</h3>
        <div id="agents-list" class="space-y-4"></div>
        <button onclick="toggleModal('agents-modal')" class="w-full py-4 text-slate-500 font-bold">إغلاق</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, where, updateDoc, increment, setDoc, serverTimestamp, deleteDoc, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC0jzecEwKgHpxHpTi8Y-_bwwfzVdtgf3E",
        authDomain: "khasmshop.firebaseapp.com",
        projectId: "khasmshop",
        storageBucket: "khasmshop.firebasestorage.app",
        messagingSenderId: "238182001615",
        appId: "1:238182001615:web:d77391030a40a481b440ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let user = null;
    let userData = null;
    let targetUID = null;

    const ADMINS = ["mhmdfthu98@gmail.com", "Mohnadyasir43@gmail.com", "muhammedaltaj111@gmail.com"];
    
    const AGENTS = [
        { name: "محمد فتحي", phone: "249907760989", email: "mhmdfthu98@gmail.com", color: "amber" },
        { name: "مهند ياسر", phone: "249916581517", email: "Mohnadyasir43@gmail.com", color: "purple" },
        { name: "محمد التاج", phone: "249914178935", email: "muhammedaltaj111@gmail.com", color: "blue" }
    ];

    onAuthStateChanged(auth, async (u) => {
        if (u) {
            user = u;
            const userRef = doc(db, "users", u.uid);
            onSnapshot(userRef, (s) => {
                if (s.exists()) {
                    userData = s.data();
                    updateUI();
                } else {
                    setDoc(userRef, {
                        name: u.displayName, img: u.photoURL, email: u.email,
                        balance: 0, points: 0, walletID: Math.floor(100000 + Math.random() * 900000).toString(),
                        subType: 'حساب عادي'
                    });
                }
            });
            if (ADMINS.includes(u.email)) {
                document.getElementById('admin-nav').classList.remove('hidden');
                loadAdminData();
            }
            loadProducts('PUBG');
            loadSubscriptions();
            loadAgents();
            loadRedeemStore();
        } else {
            signInWithPopup(auth, provider);
        }
    });

    function updateUI() {
        document.getElementById('u-name').innerText = userData.name;
        document.getElementById('u-img').src = userData.img;
        document.getElementById('u-id').innerText = `ID: #${userData.walletID}`;
        document.getElementById('u-bal').innerText = userData.balance.toLocaleString();
        document.getElementById('u-pts').innerText = userData.points;
        document.getElementById('u-sub').innerText = userData.subType;
    }

    // --- جلب المنتجات (PUBG/FF) ---
    window.loadProducts = (cat) => {
        onSnapshot(query(collection(db, "products"), where("category", "==", cat)), (s) => {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            s.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                    <div class="glass-card p-5 relative overflow-hidden group">
                        <div class="absolute -right-2 -top-2 bg-amber-400 text-black text-[8px] font-black px-3 py-1 rounded-bl-xl">+${p.points}P</div>
                        <p class="text-[11px] font-black mb-2">${p.name}</p>
                        <p class="text-amber-400 font-black text-lg mb-4">${p.price} <span class="text-[8px]">SDG</span></p>
                        <button onclick="handleOrder('${d.id}', '${p.name}', ${p.price}, ${p.points})" class="w-full py-3 rounded-xl bg-white/5 text-[9px] font-black hover:bg-amber-400 hover:text-black transition-all">شراء الآن</button>
                    </div>`;
            });
        });
    };

    // --- جلب الاشتراكات (قسم مستقل) ---
    window.loadSubscriptions = () => {
        onSnapshot(query(collection(db, "products"), where("category", "==", "SUBS")), (s) => {
            const list = document.getElementById('subs-list');
            list.innerHTML = '';
            s.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                    <div class="sub-item">
                        <div>
                            <p class="font-black text-xs text-white">${p.name}</p>
                            <p class="text-[10px] text-blue-400 font-bold">${p.price} SDG / شهر</p>
                        </div>
                        <button onclick="handleOrder('${d.id}', '${p.name}', ${p.price}, ${p.points})" class="btn-premium px-6 py-2 rounded-xl text-[10px]">تفعيل</button>
                    </div>`;
            });
        });
    };

    // --- نظام الطلبات الجديد (واتساب تلقائي + خصم محفظة) ---
    window.handleOrder = async (id, name, price, pts) => {
        if (userData.balance < price) {
            alert("❌ رصيدك غير كافي! تواصل مع الوكلاء لشحن محفظتك.");
            toggleModal('agents-modal');
            return;
        }

        const gameID = prompt("أدخل آيدي اللاعب (ID):");
        if (!gameID) return;

        try {
            // 1. الخصم من المحفظة
            await updateDoc(doc(db, "users", user.uid), { balance: increment(-price) });
            
            // 2. تسجيل الطلب في الإدارة
            await addDoc(collection(db, "orders"), {
                uID: user.uid, uName: userData.name, uWallet: userData.walletID,
                product: name, price: price, gameID: gameID, status: 'Pending',
                pts: pts, timestamp: serverTimestamp()
            });

            // 3. إرسال رسالة واتساب تلقائية (الميزة اللي طلبتها)
            const msg = encodeURIComponent(`مرحباً وكيل KhasmShop 👋\nلقد قمت بطلب: ${name}\nرقم محفظتي: #${userData.walletID}\nاسم الحساب: ${userData.name}\nآيدي اللاعب: ${gameID}\nيرجى تأكيد التنفيذ.`);
            window.open(`https://wa.me/${AGENTS[0].phone}?text=${msg}`);
            
            alert("✅ تم خصم المبلغ وإرسال الطلب للوزارة وللواتساب!");
        } catch (e) { alert("حدث خطأ!"); }
    };

    // --- نظام الوكلاء ---
    window.loadAgents = () => {
        const list = document.getElementById('agents-list');
        list.innerHTML = '';
        AGENTS.forEach(a => {
            list.innerHTML += `
                <div class="p-5 glass-card flex justify-between items-center border-r-4 border-${a.color}-500">
                    <div>
                        <p class="font-black text-sm">${a.name}</p>
                        <p class="text-[9px] text-slate-400 uppercase tracking-widest">وكيل شحن معتمد</p>
                    </div>
                    <div class="flex gap-2">
                        <button onclick="window.open('https://wa.me/${a.phone}?text=اريد شحن محفظتي')" class="w-10 h-10 rounded-full bg-green-500/10 text-green-500 flex items-center justify-center"><i class="fab fa-whatsapp"></i></button>
                        <button onclick="location.href='mailto:${a.email}'" class="w-10 h-10 rounded-full bg-blue-500/10 text-blue-500 flex items-center justify-center"><i class="fas fa-envelope"></i></button>
                    </div>
                </div>`;
        });
    };
    // --- إدارة الوزارة (تكملة الوظائف الحيوية) ---
    
    // البحث عن مستخدم برقم المحفظة (6 أرقام)
    window.findUser = async () => {
        const wid = document.getElementById('search-uid').value;
        if (!wid || wid.length < 6) return alert("يرجى إدخال 6 أرقام صحيحة");

        const q = query(collection(db, "users"), where("walletID", "==", wid.toString()));
        const snap = await getDocs(q);
        
        if(!snap.empty) {
            const u = snap.docs[0]; 
            targetUID = u.id; // تخزين الـ ID الحقيقي للتعامل معه في الشحن
            document.getElementById('target-name').innerText = u.data().name;
            document.getElementById('target-img').src = u.data().img;
            document.getElementById('user-info').classList.remove('hidden');
        } else { 
            alert("❌ لم يتم العثور على هذه المحفظة في النظام!"); 
            document.getElementById('user-info').classList.add('hidden');
        }
    };

    // شحن الرصيد للمستخدم الذي تم البحث عنه
    window.addCash = async () => {
        const amt = Number(prompt("أدخل المبلغ المراد إضافته لمحفظة الزبون:"));
        if (amt && amt > 0) {
            try {
                await updateDoc(doc(db, "users", targetUID), { 
                    balance: increment(amt) 
                });
                alert(`✅ تم شحن ${amt} جنيه بنجاح!`);
                document.getElementById('user-info').classList.add('hidden');
                document.getElementById('search-uid').value = '';
            } catch (e) {
                alert("خطأ في عملية الشحن!");
            }
        }
    };

    // إضافة منتج جديد (أو اشتراك) للمتجر
    window.addProduct = async () => {
        const n = document.getElementById('p-name').value;
        const p = Number(document.getElementById('p-price').value);
        const pts = Number(document.getElementById('p-pts').value) || 0;
        const c = document.getElementById('p-cat').value;

        if(!n || !p) return alert("يرجى ملء الاسم والسعر على الأقل!");

        try {
            await addDoc(collection(db, "products"), { 
                name: n, 
                price: p, 
                points: pts, 
                category: c,
                createdAt: serverTimestamp() 
            });
            alert("✅ تمت إضافة المنتج للمتجر بنجاح!");
            // تفريغ الحقول
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-pts').value = '';
        } catch (e) {
            alert("حدث خطأ أثناء الإضافة!");
        }
    };

    // حذف منتج من المتجر
    window.deleteProduct = async (id) => {
        if(confirm("هل أنت متأكد من حذف هذا المنتج نهائياً؟")) {
            try {
                await deleteDoc(doc(db, "products", id));
                alert("تم الحذف.");
            } catch (e) {
                alert("خطأ في الحذف!");
            }
        }
    };

    // مراقبة بيانات الإدارة (الطلبات والمنتجات)
    window.loadAdminData = () => {
        // 1. مراقبة الطلبات المعلقة (Pending)
        onSnapshot(query(collection(db, "orders"), where("status", "==", "Pending")), (s) => {
            const list = document.getElementById('adm-orders'); 
            list.innerHTML = '';
            if (s.empty) {
                list.innerHTML = '<p class="text-center text-[10px] text-slate-500 py-10 italic">لا توجد طلبات معلقة حالياً...</p>';
            }
            s.forEach(d => {
                const o = d.data();
                list.innerHTML += `
                    <div class="glass-card p-5 border-l-4 border-amber-400 animate-pulse">
                        <div class="flex justify-between mb-2">
                            <span class="text-[10px] font-black text-white">${o.product}</span>
                            <span class="text-amber-400 text-[10px] font-mono">#${o.uWallet}</span>
                        </div>
                        <div class="bg-black/20 p-3 rounded-xl mb-4">
                             <p class="text-[9px] text-slate-300">ID اللاعب: <span class="text-white font-bold">${o.gameID}</span></p>
                             <p class="text-[9px] text-slate-300">الزبون: ${o.uName}</p>
                        </div>
                        <div class="flex gap-2">
                            <button onclick="markDone('${d.id}', '${o.uID}', ${o.pts})" class="flex-1 py-3 bg-green-500 text-black rounded-xl text-[10px] font-black shadow-lg shadow-green-500/20">تأكيد التسليم ✅</button>
                            <button onclick="cancelOrder('${d.id}', '${o.uID}', ${o.price})" class="px-4 py-3 bg-red-500/10 text-red-500 rounded-xl text-[10px]"><i class="fas fa-times"></i></button>
                        </div>
                    </div>`;
            });
        });

        // 2. مراقبة قائمة المنتجات للحذف والتعديل
        onSnapshot(query(collection(db, "products")), (s) => {
            const list = document.getElementById('adm-list'); 
            list.innerHTML = '';
            s.forEach(d => {
                const p = d.data();
                list.innerHTML += `
                    <div class="flex justify-between items-center p-4 glass-card mb-2 text-[10px]">
                        <span><b class="text-amber-400">[${p.category}]</b> ${p.name}</span>
                        <div class="flex items-center gap-3">
                            <span class="font-mono">${p.price} SDG</span>
                            <button onclick="deleteProduct('${d.id}')" class="text-red-500 p-2 hover:bg-red-500/10 rounded-lg"><i class="fas fa-trash"></i></button>
                        </div>
                    </div>`;
            });
        });
    };

    // تنفيذ الطلب ومنح النقاط
    window.markDone = async (id, uid, pts) => {
        try {
            await updateDoc(doc(db, "orders", id), { status: 'Done' });
            if (pts > 0) {
                await updateDoc(doc(db, "users", uid), { points: increment(pts) });
            }
            alert("✔️ تم تحديث حالة الطلب ومنح النقاط للزبون.");
        } catch (e) { alert("خطأ!"); }
    };

    // إلغاء الطلب وإرجاع المال للمحفظة
    window.cancelOrder = async (id, uid, price) => {
        if(confirm("هل تريد إلغاء الطلب وإرجاع المبلغ لمحفظة الزبون؟")) {
            await updateDoc(doc(db, "users", uid), { balance: increment(price) });
            await deleteDoc(doc(db, "orders", id));
            alert("✖ تم الإلغاء وإرجاع المال.");
        }
    };

    // --- سوق النقاط (Redeem Store) ---
    window.loadRedeemStore = () => {
        const list = document.getElementById('redeem-list');
        // يمكنك إضافة هدايا برمجية هنا أو جلبها من الـ Firebase
        const items = [
            {n: "110 جوهرة فري فاير", c: 30, icon: "💎"}, 
            {n: "4000 جنيه رصيد محفظة", c: 30, icon: "💰"}
        ];
        list.innerHTML = '';
        items.forEach(i => {
            list.innerHTML += `
                <div class="glass-card p-6 flex justify-between items-center border-b-2 border-white/5">
                    <div class="flex items-center gap-4 text-right">
                        <div class="text-2xl">${i.icon}</div>
                        <div>
                            <p class="text-xs font-black text-white">${i.n}</p>
                            <p class="text-[9px] text-amber-400 font-bold uppercase italic">التكلفة: ${i.c} نقطة</p>
                        </div>
                    </div>
                    <button onclick="redeem('${i.n}', ${i.c})" class="btn-premium px-6 py-2 rounded-xl text-[10px]">استبدال</button>
                </div>`;
        });
    };

    window.redeem = async (n, c) => {
        if(userData.points < c) return alert("❌ نقاطك غير كافية لهذا العرض!");
        
        if(confirm(`هل تريد استبدال ${c} نقطة بـ ${n}؟`)) {
            try {
                await updateDoc(doc(db, "users", user.uid), { points: increment(-c) });
                if(n.includes("4000 جنيه")) {
                    await updateDoc(doc(db, "users", user.uid), { balance: increment(4000) });
                    alert("✅ تم إضافة 4000 جنيه لرصيدك فوراً!");
                } else {
                    await addDoc(collection(db, "orders"), {
                        uID: user.uid, uName: userData.name, product: "🎁 هدية نقاط: " + n,
                        status: 'Pending', timestamp: serverTimestamp()
                    });
                    alert("✅ تم إرسال طلب الهدية للوزارة للتنفيذ.");
                }
            } catch (e) { alert("خطأ في العملية!"); }
        }
    };

    // --- نظام التنقل (Navigation System) ---
    window.showPage = (id, btn) => {
        // إخفاء جميع الصفحات
        document.querySelectorAll('.page').forEach(p => {
            p.classList.remove('active');
            setTimeout(() => p.style.display = 'none', 300); // تأخير بسيط للأنيميشن
        });
        
        // إظهار الصفحة المطلوبة
        const targetPage = document.getElementById(id);
        targetPage.style.display = 'block';
        setTimeout(() => targetPage.classList.add('active'), 50);

        // تحديث أزرار التنقل
        document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
        if(btn) btn.classList.add('active');
    };

    window.switchAdminTab = (tab, btn) => {
        document.getElementById('adm-orders').classList.toggle('hidden', tab !== 'orders');
        document.getElementById('adm-manage').classList.toggle('hidden', tab !== 'manage');
        
        document.querySelectorAll('.adm-tab').forEach(t => { 
            t.classList.remove('bg-amber-400', 'text-black'); 
            t.classList.add('text-white'); 
        });
        btn.classList.add('bg-amber-400', 'text-black');
    };

    // وظائف إضافية
    window.toggleModal = (id) => document.getElementById(id).classList.toggle('hidden');
    window.copyID = () => { 
        navigator.clipboard.writeText(userData.walletID); 
        alert("📋 تم نسخ آيدي المحفظة بنجاح!"); 
    };

</script>

<style>
    /* تحسينات إضافية للواجهة */
    .cat-btn.active {
        background: #fbbf24 !important;
        color: #000 !important;
        box-shadow: 0 0 20px rgba(251, 191, 36, 0.4);
    }

    /* سكرول بار مخفي */
    ::-webkit-scrollbar { width: 0px; background: transparent; }

    /* تأثيرات على الكروت عند التمرير */
    .glass-card {
        transition: transform 0.3s ease, border 0.3s ease;
    }
    .glass-card:hover {
        border-color: rgba(251, 191, 36, 0.5);
    }

    /* تصميم أزرار التنفيذ في الإدارة */
    .btn-done {
        background: linear-gradient(45deg, #10b981, #059669);
    }

    /* قسم الاشتراكات - لمسة جمالية */
    .sub-item {
        position: relative;
        overflow: hidden;
    }
    .sub-item::after {
        content: 'VIP';
        position: absolute;
        top: 5px;
        left: -20px;
        background: #3b82f6;
        color: white;
        font-size: 8px;
        font-weight: 900;
        padding: 2px 20px;
        transform: rotate(-45deg);
    }

    /* أنيميشن الظهور التدريجي */
    @keyframes fadeInUp {
        from { opacity: 0; transform: translateY(10px); }
        to { opacity: 1; transform: translateY(0); }
    }
    .product-card { animation: fadeInUp 0.5s ease backwards; }
</style>

</body>
</html>
