<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Wallet App</title>
  <style>
    body {
      font-family: Arial;
      background: #f4f4f4;
      text-align: center;
      padding: 20px;
    }

    .box {
      background: white;
      padding: 20px;
      margin: 10px auto;
      width: 300px;
      border-radius: 10px;
      box-shadow: 0 0 10px #ccc;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px 0;
    }

    button {
      padding: 10px;
      width: 95%;
      margin-top: 5px;
      cursor: pointer;
    }

    .balance {
      font-size: 22px;
      color: green;
    }
  </style>
</head>

<body>

  <h1>💰 Wallet App</h1>

  <div class="box">
    <h3>Login</h3>
    <input id="phone" placeholder="Phone">
    <input id="password" placeholder="Password">
    <button onclick="login()">Login</button>
  </div>

  <div class="box">
    <h3>Balance</h3>
    <div class="balance" id="balance">0</div>
  </div>

  <div class="box">
    <h3>Deposit</h3>
    <input id="depositAmount" placeholder="Amount">
    <button onclick="deposit()">Deposit</button>
  </div>

  <div class="box">
    <h3>Transfer</h3>
    <input id="toPhone" placeholder="Send to phone">
    <input id="transferAmount" placeholder="Amount">
    <button onclick="transfer()">Send</button>
  </div>

<script>
  // ===== Users (fake database) =====
  let users = [
    { id: 1, phone: "111", password: "1234", balance: 1000 },
    { id: 2, phone: "222", password: "1234", balance: 500 }
  ];

  let currentUser = null;

  // ===== Login =====
  function login() {
    let phone = document.getElementById("phone").value;
    let pass = document.getElementById("password").value;

    let user = users.find(u => u.phone === phone && u.password === pass);

    if (!user) {
      alert("Login failed");
      return;
    }

    currentUser = user;
    updateBalance();
    alert("Welcome " + phone);
  }

  // ===== Update balance =====
  function updateBalance() {
    if (currentUser) {
      document.getElementById("balance").innerText = currentUser.balance;
    }
  }

  // ===== Deposit =====
  function deposit() {
    if (!currentUser) return alert("Login first");

    let amount = Number(document.getElementById("depositAmount").value);
    currentUser.balance += amount;

    updateBalance();
  }

  // ===== Transfer =====
  function transfer() {
    if (!currentUser) return alert("Login first");

    let phone = document.getElementById("toPhone").value;
    let amount = Number(document.getElementById("transferAmount").value);

    let receiver = users.find(u => u.phone === phone);

    if (!receiver) return alert("User not found");
    if (currentUser.balance < amount) return alert("Not enough balance");

    currentUser.balance -= amount;
    receiver.balance += amount;

    updateBalance();
    alert("Transfer successful");
  }
</script>

</body>
</html>
