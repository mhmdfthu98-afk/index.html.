<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhasmShop VIP | الإصدار الاحترافي الشامل</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap');
        
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f8fafc;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        .page { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease; }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        .glass { background: rgba(255, 255, 255, 0.9); backdrop-filter: blur(12px); }
        .card-vip { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); border: 1px solid rgba(255,255,255,0.1); }
        
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .btn-click:active { transform: scale(0.95); }
    </style>
</head>
<body>

<div id="app" class="max-w-md mx-auto min-h-screen bg-white shadow-2xl relative pb-32">
    
    <header class="glass sticky top-0 z-[100] px-5 py-4 border-b flex justify-between items-center">
        <div class="flex items-center gap-3">
            <div class="relative">
                <img id="u-img" class="w-11 h-11 rounded-2xl object-cover border-2 border-amber-400 shadow-md" src="">
                <div class="absolute -bottom-1 -right-1 w-3 h-3 bg-green-500 border-2 border-white rounded-full"></div>
            </div>
            <div>
                <h2 id="u-name" class="font-black text-xs text-slate-800">تحميل...</h2>
                <span id="u-id" class="text-[9px] font-bold text-slate-400 tracking-tighter">#000000</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="toggleAgents()" class="w-10 h-10 rounded-xl bg-green-50 text-green-600 flex items-center justify-center btn-click">
                <i class="fab fa-whatsapp text-lg"></i>
            </button>
            <button onclick="openRedeem()" class="w-10 h-10 rounded-xl bg-amber-50 text-amber-600 flex items-center justify-center btn-click">
                <i class="fas fa-gift"></i>
            </button>
        </div>
    </header>

    <main class="p-4">
        
        <section id="p-home" class="page active space-y-6">
            <div class="card-vip p-6 rounded-[35px] text-white shadow-xl relative overflow-hidden">
                <div class="absolute top-0 right-0 p-6 opacity-5"><i class="fas fa-wallet text-7xl"></i></div>
                <p class="text-[10px] font-bold opacity-50 uppercase tracking-[2px]">الرصيد المتاح</p>
                <h3 class="text-4xl font-black my-2"><span id="u-bal">0</span> <span class="text-xs opacity-40">SDG</span></h3>
                
                <div class="flex justify-between items-center border-t border-white/10 mt-5 pt-4">
                    <div class="flex items-center gap-2">
                        <div class="w-8 h-8 rounded-full bg-amber-400/20 flex items-center justify-center">
                            <i class="fas fa-star text-amber-400 text-[10px]"></i>
                        </div>
                        <div>
                            <p class="text-[8px] opacity-40 leading-none">نقاطي</p>
                            <p id="u-pts" class="text-xs font-black">0</p>
                        </div>
                    </div>
                    <div class="text-left">
                        <p class="text-[8px] opacity-40 leading-none">حالة الاشتراك</p>
                        <p id="sub-timer" class="text-[9px] font-black text-blue-400">عضو عادي</p>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <button onclick="loadProducts('PUBG', this)" class="cat-btn bg-amber-400 text-black px-6 py-3 rounded-2xl text-[11px] font-black shadow-lg shadow-amber-100 shrink-0">PUBG</button>
                <button onclick="loadProducts('FREEFIRE', this)" class="cat-btn bg-white border text-slate-400 px-6 py-3 rounded-2xl text-[11px] font-black shrink-0">FREE FIRE</button>
                <button onclick="loadProducts('CLASH', this)" class="cat-btn bg-white border text-slate-400 px-6 py-3 rounded-2xl text-[11px] font-black shrink-0">CLASH</button>
            </div>

            <div id="product-list" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="p-sub" class="page space-y-4">
            <h3 class="font-black text-slate-800 text-lg px-2 italic">عضوية VIP (30 يوم)</h3>
            
            <div class="bg-white p-6 rounded-[35px] border-4 border-amber-400 shadow-xl relative overflow-hidden">
                <div class="absolute -top-4 -right-4 w-16 h-16 bg-amber-400 rotate-45"></div>
                <h4 class="text-xl font-black italic">PRIME PLUS</h4>
                <ul class="text-[10px] text-slate-500 font-bold my-4 space-y-1">
                    <li><i class="fas fa-check text-green-500 mr-1"></i> خصم 10% على جميع المنتجات</li>
                    <li><i class="fas fa-check text-green-500 mr-1"></i> أولوية في تنفيذ الطلبات</li>
                    <li><i class="fas fa-check text-green-500 mr-1"></i> شارة VIP بجانب اسمك</li>
                </ul>
                <div class="flex justify-between items-end pt-2">
                    <p class="text-2xl font-black">10,000 <span class="text-xs">SDG</span></p>
                    <button onclick="buySub('PrimePlus', 10000, 10)" class="bg-amber-400 px-6 py-3 rounded-2xl font-black text-xs btn-click">تفعيل الشهر</button>
                </div>
            </div>
        </section>

        <section id="p-admin" class="page space-y-6">
            <div class="bg-blue-600 p-6 rounded-[35px] text-white shadow-lg">
                <h4 class="text-xs font-black mb-4"><i class="fas fa-user-plus mr-2"></i> شحن محفظة للزبائن</h4>
                <div class="flex gap-2">
                    <input id="search-uid" type="number" placeholder="رقم المحفظة (مثلاً 123456)" class="flex-1 p-4 rounded-2xl text-black text-xs font-bold outline-none border-none">
                    <button onclick="findUser()" class="bg-white text-blue-600 px-5 rounded-2xl text-xs font-black">بحث</button>
                </div>
                
                <div id="user-info" class="hidden mt-4 bg-blue-700/50 p-4 rounded-2xl flex items-center justify-between border border-white/10">
                    <div class="flex items-center gap-3">
                        <img id="target-img" class="w-10 h-10 rounded-xl" src="">
                        <p id="target-name" class="text-[11px] font-black truncate w-24"></p>
                    </div>
                    <button onclick="addCash()" class="bg-green-500 text-white px-4 py-2 rounded-xl text-[10px] font-black">إضافة رصيد</button>
                </div>
            </div>

            <div class="flex bg-slate-100 p-1 rounded-2xl">
                <button onclick="switchAdminTab('orders', this)" class="adm-btn flex-1 bg-white p-3 rounded-xl text-[10px] font-black shadow-sm">الطلبات الواردة</button>
                <button onclick="switchAdminTab('add', this)" class="adm-btn flex-1 p-3 rounded-xl text-[10px] font-black text-slate-400">إدارة المنتجات</button>
            </div>

            <div id="adm-orders" class="space-y-4"></div>

            <div id="adm-add" class="hidden space-y-4">
                <div class="bg-white p-6 rounded-[35px] border-2 space-y-3">
                    <input id="p-name" type="text" placeholder="اسم الحزمة (مثلاً 60 شدة)" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none">
                    <div class="flex gap-2">
                        <input id="p-price" type="number" placeholder="السعر" class="flex-1 p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none">
                        <input id="p-pts" type="number" placeholder="النقاط" class="w-24 p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none">
                    </div>
                    <select id="p-cat" class="w-full p-4 bg-slate-50 rounded-2xl text-xs font-bold border-none outline-none">
                        <option value="PUBG">PUBG</option>
                        <option value="FREEFIRE">FREE FIRE</option>
                        <option value="CLASH">CLASH</option>
                    </select>
                    <button onclick="addProduct()" class="w-full bg-slate-900 text-white py-4 rounded-2xl font-black text-xs btn-click">نشر في المتجر</button>
                </div>
                <div id="adm-products-list" class="space-y-2 pt-4"></div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-6 left-1/2 -translate-x-1/2 w-[92%] glass shadow-2xl rounded-[35px] p-2 flex justify-around items-center z-[1000]">
        <button onclick="showPage('p-home', this)" class="nav-btn p-4 text-amber-500 transition-all"><i class="fas fa-home text-xl"></i></button>
        <button onclick="showPage('p-sub', this)" class="nav-btn p-4 text-slate-300 transition-all"><i class="fas fa-gem text-xl"></i></button>
        <button id="admin-nav" onclick="showPage('p-admin', this)" class="hidden nav-btn p-4 text-slate-300 transition-all"><i class="fas fa-user-shield text-xl"></i></button>
    </nav>
</div>

<div id="agents-modal" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[2000] flex items-end">
    <div class="bg-white w-full rounded-t-[45px] p-8 space-y-5 animate-slide-up">
        <div class="w-12 h-1 bg-slate-200 rounded-full mx-auto mb-2"></div>
        <h3 class="font-black text-center text-lg">الوكلاء المعتمدين للشحن</h3>
        <div class="space-y-3">
            <button onclick="whatsapp('0907760989')" class="w-full p-5 bg-slate-50 rounded-[25px] flex justify-between items-center border border-slate-100 btn-click">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-500 text-white rounded-full flex items-center justify-center font-black">م</div>
                    <div class="text-right">
                        <p class="text-xs font-black">محمد فتحي</p>
                        <p class="text-[9px] text-green-500">متصل الآن - وكيل رئيسي</p>
                    </div>
                </div>
                <i class="fab fa-whatsapp text-2xl text-green-500"></i>
            </button>
            <button onclick="whatsapp('0916581517')" class="w-full p-5 bg-slate-50 rounded-[25px] flex justify-between items-center border border-slate-100 btn-click">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-500 text-white rounded-full flex items-center justify-center font-black">م</div>
                    <div class="text-right">
                        <p class="text-xs font-black">محمد التاج</p>
                        <p class="text-[9px] text-slate-400">وكيل معتمد</p>
                    </div>
                </div>
                <i class="fab fa-whatsapp text-2xl text-green-500"></i>
            </button>
            <button onclick="whatsapp('0914178935')" class="w-full p-5 bg-slate-50 rounded-[25px] flex justify-between items-center border border-slate-100 btn-click">
                <div class="flex items-center gap-3">
                    <div class="w-10 h-10 bg-green-500 text-white rounded-full flex items-center justify-center font-black">م</div>
                    <div class="text-right">
                        <p class="text-xs font-black">مهند ياسر</p>
                        <p class="text-[9px] text-slate-400">وكيل معتمد</p>
                    </div>
                </div>
                <i class="fab fa-whatsapp text-2xl text-green-500"></i>
            </button>
        </div>
        <button onclick="toggleAgents()" class="w-full text-slate-400 font-black text-xs py-2 mt-2">إغلاق القائمة</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, where, updateDoc, increment, setDoc, serverTimestamp, orderBy, getDocs, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC0jzecEwKgHpxHpTi8Y-_bwwfzVdtgf3E",
        authDomain: "khasmshop.firebaseapp.com",
        projectId: "khasmshop",
        storageBucket: "khasmshop.firebasestorage.app",
        messagingSenderId: "238182001615",
        appId: "1:238182001615:web:d77391030a40a481b440ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    let user = null;
    let userData = null;
    const ADMINS = ["mhmdfthu98@gmail.com", "muhammedaltaj111@gmail.com", "mohnadyasir43@gmail.com"];

    // 1. نظام تسجيل الدخول والمزامنة
    onAuthStateChanged(auth, async (u) => {
        if (u) {
            user = u;
            const uRef = doc(db, "users", u.uid);
            onSnapshot(uRef, (s) => {
                if (s.exists()) {
                    userData = s.data();
                    updateUI();
                } else {
                    setDoc(uRef, {
                        name: u.displayName, img: u.photoURL, email: u.email,
                        balance: 0, points: 0, walletID: Math.floor(100000 + Math.random() * 900000).toString(),
                        subType: 'None', subEnd: null, discount: 0
                    });
                }
            });
            if (ADMINS.includes(u.email)) {
                document.getElementById('admin-nav').classList.remove('hidden');
                loadAdminData();
            }
            loadProducts('PUBG');
        } else {
            signInWithPopup(auth, provider);
        }
    });

    // 2. تحديث الواجهة والعداد
    function updateUI() {
        document.getElementById('u-name').innerText = userData.name;
        document.getElementById('u-img').src = userData.img;
        document.getElementById('u-id').innerText = `#${userData.walletID}`;
        document.getElementById('u-bal').innerText = userData.balance.toLocaleString();
        document.getElementById('u-pts').innerText = userData.points;
        
        const timerTxt = document.getElementById('sub-timer');
        if (userData.subEnd) {
            const end = userData.subEnd.toDate();
            const now = new Date();
            const diff = end - now;
            if (diff > 0) {
                const days = Math.floor(diff / (1000 * 60 * 60 * 24));
                const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
                timerTxt.innerText = `VIP: ينتهي بعد ${days} يوم و ${hours} ساعة`;
                timerTxt.className = "text-[9px] font-black text-amber-500";
            } else {
                timerTxt.innerText = "انتهى الاشتراك";
                updateDoc(doc(db, "users", user.uid), { subType: 'None', discount: 0, subEnd: null });
            }
        } else {
            timerTxt.innerText = "عضو عادي";
        }
    }

    // 3. عرض المنتجات
    window.loadProducts = async (cat, btn) => {
        if(btn) {
            document.querySelectorAll('.cat-btn').forEach(b => {
                b.classList.remove('bg-amber-400', 'text-black', 'shadow-lg');
                b.classList.add('bg-white', 'text-slate-400', 'border');
            });
            btn.classList.add('bg-amber-400', 'text-black', 'shadow-lg');
        }

        onSnapshot(query(collection(db, "products"), where("category", "==", cat)), (s) => {
            const list = document.getElementById('product-list');
            list.innerHTML = '';
            s.forEach(d => {
                const p = d.data();
                const price = Math.floor(p.price - (p.price * (userData.discount / 100)));
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-[30px] border shadow-sm relative animate-fadeIn">
                        <span class="absolute top-2 left-2 bg-blue-50 text-blue-600 text-[8px] px-2 py-1 rounded-full font-black">+${p.points || 0} P</span>
                        <p class="text-[10px] font-black h-8 leading-tight text-slate-700">${p.name}</p>
                        <p class="text-blue-600 font-black text-sm my-3">${price.toLocaleString()} <span class="text-[8px]">SDG</span></p>
                        <button onclick="order('${d.id}', '${p.name}', ${price}, ${p.points || 0})" class="w-full bg-slate-900 text-white py-3 rounded-2xl text-[10px] font-black btn-click">اطلب الآن</button>
                    </div>`;
            });
        });
    };

    window.order = async (id, name, price, pts) => {
        if (userData.balance < price) return alert("عذراً، رصيدك لا يكفي لشراء هذه الحزمة.");
        const gameID = prompt("أدخل آيدي اللعبة (Player ID):");
        if (!gameID) return;
        
        await addDoc(collection(db, "orders"), {
            uid: user.uid, uName: userData.name, product: name, price: price,
            gameID: gameID, status: 'Pending', pts: pts, time: serverTimestamp()
        });
        await updateDoc(doc(db, "users", user.uid), { balance: increment(-price) });
        alert("تم إرسال الطلب بنجاح! سيصلك الشحن خلال دقائق.");
    };

    // 4. لوحة التحكم (إصلاح الحذف والطلبات)
    window.loadAdminData = () => {
        onSnapshot(query(collection(db, "orders"), where("status", "==", "Pending"), orderBy("time", "desc")), (s) => {
            const list = document.getElementById('adm-orders');
            list.innerHTML = '';
            s.forEach(d => {
                const o = d.data();
                list.innerHTML += `
                    <div class="bg-white p-5 rounded-[25px] border-2 border-amber-100 shadow-sm">
                        <div class="flex justify-between items-center mb-3">
                            <span class="text-xs font-black text-slate-800">${o.product}</span>
                            <span class="text-[10px] font-bold text-amber-600">${o.price} SDG</span>
                        </div>
                        <div class="bg-slate-50 p-3 rounded-xl border border-dashed border-slate-200">
                            <p class="text-[10px] font-bold">الآيدي: <span class="text-blue-600 select-all font-black">${o.gameID}</span></p>
                            <p class="text-[9px] text-slate-400 mt-1">الزبون: ${o.uName}</p>
                        </div>
                        <button onclick="done('${d.id}', '${o.uid}', ${o.pts})" class="w-full mt-4 bg-green-500 text-white py-3 rounded-xl text-[11px] font-black btn-click">تأكيد التنفيذ (+${o.pts} نقاط)</button>
                    </div>`;
            });
        });

        onSnapshot(collection(db, "products"), (s) => {
            const list = document.getElementById('adm-products-list');
            list.innerHTML = '<p class="text-[10px] font-black text-slate-400 mb-2">المنتجات الحالية (للحذف):</p>';
            s.forEach(d => {
                list.innerHTML += `
                    <div class="flex justify-between items-center bg-white p-3 rounded-xl border mb-2">
                        <span class="text-[10px] font-bold">${d.data().name} (${d.data().category})</span>
                        <button onclick="delProd('${d.id}')" class="w-8 h-8 bg-red-50 text-red-500 rounded-lg flex items-center justify-center btn-click">
                            <i class="fas fa-trash text-xs"></i>
                        </button>
                    </div>`;
            });
        });
    };

    // إضافة منتج جديد
    window.addProduct = async () => {
        const name = document.getElementById('p-name').value;
        const price = Number(document.getElementById('p-price').value);
        const points = Number(document.getElementById('p-pts').value);
        const cat = document.getElementById('p-cat').value;

        if (!name || !price) return alert("يرجى إكمال بيانات المنتج الأساسية (الاسم والسعر).");

        try {
            await addDoc(collection(db, "products"), {
                name: name,
                price: price,
                category: cat,
                points: points || 0,
                createdAt: serverTimestamp()
            });
            alert("تمت إضافة المنتج للمتجر بنجاح!");
            // تنظيف الحقول
            document.getElementById('p-name').value = '';
            document.getElementById('p-price').value = '';
            document.getElementById('p-pts').value = '';
        } catch (e) {
            console.error("Error adding product: ", e);
            alert("حدث خطأ أثناء الإضافة، تأكد من صلاحيات الإدمن.");
        }
    };

    // حذف منتج
    window.delProd = async (id) => {
        if (confirm("هل أنت متأكد من رغبتك في حذف هذا المنتج نهائياً؟")) {
            try {
                await deleteDoc(doc(db, "products", id));
                alert("تم حذف المنتج.");
            } catch (e) {
                alert("فشل الحذف، راجع القواعد (Rules).");
            }
        }
    };

    // تأكيد تنفيذ الطلب (إضافة نقاط للزبون)
    window.done = async (id, uid, pts) => {
        try {
            await updateDoc(doc(db, "orders", id), { status: 'Done' });
            if (pts > 0) {
                await updateDoc(doc(db, "users", uid), { points: increment(pts) });
            }
            alert("تم تحديث حالة الطلب وإضافة النقاط للزبون.");
        } catch (e) {
            alert("حدث خطأ أثناء تحديث الطلب.");
        }
    };

    // 5. نظام شحن المحفظة (البحث بالإيد)
    let targetUserUID = null;
    window.findUser = async () => {
        const wid = document.getElementById('search-uid').value;
        if (!wid) return alert("يرجى إدخال رقم المحفظة المكون من 6 أرقام.");
        
        const q = query(collection(db, "users"), where("walletID", "==", wid.toString()));
        try {
            const snap = await getDocs(q);
            if (snap.empty) {
                alert("عذراً، لم يتم العثور على أي زبون بهذا الرقم.");
                document.getElementById('user-info').classList.add('hidden');
                return;
            }
            const u = snap.docs[0];
            targetUserUID = u.id;
            document.getElementById('target-name').innerText = u.data().name;
            document.getElementById('target-img').src = u.data().img || 'https://via.placeholder.com/150';
            document.getElementById('user-info').classList.remove('hidden');
        } catch (e) {
            alert("خطأ في البحث، تأكد من اتصال الإنترنت.");
        }
    };

    window.addCash = async () => {
        const amount = Number(prompt("أدخل المبلغ المراد شحنه لمحفظة " + document.getElementById('target-name').innerText + ":"));
        if (!amount || amount <= 0) return;
        
        try {
            await updateDoc(doc(db, "users", targetUserUID), { balance: increment(amount) });
            alert("تمت عملية الشحن بنجاح! الرصيد الجديد متاح الآن للزبون.");
            document.getElementById('user-info').classList.add('hidden');
            document.getElementById('search-uid').value = '';
        } catch (e) {
            alert("فشل الشحن، تأكد من صلاحياتك كإدمن.");
        }
    };

    // 6. شراء الاشتراك لمدة شهر (30 يوم)
    window.buySub = async (type, price, disc) => {
        if (userData.balance < price) return alert("رصيدك الحالي لا يكفي لتفعيل هذا الاشتراك.");
        if (!confirm("سيتم خصم " + price + " SDG لتفعيل عضوية VIP لمدة 30 يوم. هل أنت موافق؟")) return;
        
        const expiry = new Date();
        expiry.setDate(expiry.getDate() + 30); 
        
        try {
            await updateDoc(doc(db, "users", user.uid), {
                balance: increment(-price),
                subType: type,
                discount: disc,
                subEnd: expiry
            });
            alert("مبروك! تم تفعيل مزايا PRIME PLUS بنجاح لمدة شهر.");
        } catch (e) {
            alert("حدث خطأ أثناء تفعيل الاشتراك.");
        }
    };

    // وظائف التنقل والواجهة
    window.whatsapp = (num) => {
        const msg = encodeURIComponent(`مرحباً، أريد شحن محفظتي في متجر خصم شوب.\nرقم محفظتي: #${userData.walletID}`);
        window.open(`https://wa.me/249${num.substring(1)}?text=${msg}`);
    };

    window.toggleAgents = () => document.getElementById('agents-modal').classList.toggle('hidden');

    window.showPage = (id, btn) => { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById(id).classList.add('active'); 
        
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.replace('text-amber-500', 'text-slate-300'));
        if(btn) btn.classList.replace('text-slate-300', 'text-amber-500');
    };

    window.switchAdminTab = (t, btn) => {
        document.getElementById('adm-orders').classList.toggle('hidden', t !== 'orders');
        document.getElementById('adm-add').classList.toggle('hidden', t !== 'add');
        
        document.querySelectorAll('.adm-btn').forEach(b => {
            b.classList.remove('bg-white', 'shadow-sm', 'text-slate-800');
            b.classList.add('text-slate-400');
        });
        btn.classList.add('bg-white', 'shadow-sm', 'text-slate-800');
    };

    window.openRedeem = () => {
        alert(`نقاطك الحالية: ${userData.points}\nسيتم إضافة سوق استبدال النقاط بجوائز حقيقية في التحديث القادم!`);
    };

</script>
</body>
</html>
