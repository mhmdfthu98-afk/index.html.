<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KHASM SHOP | V6.7</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap');
        body { font-family: 'Cairo', sans-serif; background: #f0f2f5; margin: 0; overflow-x: hidden; }
        
        /* التصميم العلوي - البانر */
        .pubg-banner {
            background: linear-gradient(rgba(0,0,0,0.8), rgba(0,0,0,0.4)), url('https://w0.peakpx.com/wallpaper/403/602/HD-wallpaper-pubg-mobile-karakin-pubg-mobile-poster-battle-royale-2021-games-pubg.jpg');
            background-size: cover; background-position: center; height: 180px; border-radius: 0 0 50px 50px;
        }
        
        /* كارت المحفظة الهائم */
        .wallet-card { margin-top: -55px; position: relative; z-index: 20; }
        
        /* تأثيرات التحميل */
        .loader-spin { border: 3px solid #f3f3f3; border-top: 3px solid #eab308; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading-screen" class="fixed inset-0 z-[10000] bg-slate-900 flex flex-col items-center justify-center">
    <div class="loader-spin mb-4"></div>
    <p class="text-white font-bold animate-pulse text-sm">جاري فحص الحساب...</p>
</div>

<div id="auth-screen" class="hidden fixed inset-0 z-[9999] bg-slate-900 flex flex-col items-center justify-center p-6 text-center">
    <h1 class="text-6xl font-black text-yellow-500 mb-2 italic tracking-tighter">KHASM SHOP</h1>
    <p class="text-slate-400 mb-10 text-xs font-bold uppercase">The Elite PUBG Mobile Service</p>
    <button id="google-login-btn" class="bg-white text-slate-900 px-8 py-5 rounded-[30px] font-black shadow-2xl flex items-center gap-4 text-lg active:scale-95 transition-all">
        <img src="https://www.google.com/favicon.ico" class="w-6"> دخول عبر حساب جوجل
    </button>
</div>

<div id="main-app" class="hidden pb-32">
    <div class="pubg-banner flex items-center justify-center text-center">
        <div>
            <h1 class="text-3xl font-black text-white italic tracking-tighter">KHASM SHOP</h1>
            <p class="text-yellow-500 text-[10px] font-bold italic underline">بوابة شحن ببجي موبايل - السودان</p>
        </div>
    </div>

    <main class="max-w-md mx-auto px-4">
        <div class="wallet-card bg-white rounded-[40px] p-6 shadow-2xl border">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-3">
                    <img id="uImg" class="w-14 h-14 rounded-2xl border-2 border-slate-50 shadow-sm" src="">
                    <div>
                        <h2 id="uName" class="font-black text-slate-800 text-sm">...</h2>
                        <div id="uWallet" class="text-[10px] text-yellow-600 font-bold bg-yellow-50 px-2 py-0.5 rounded-lg border mt-1">#000000</div>
                    </div>
                </div>
                <button id="logout-btn" class="w-10 h-10 bg-red-50 text-red-500 rounded-xl"><i class="fas fa-power-off"></i></button>
            </div>
            
            <div class="grid grid-cols-2 gap-4">
                <div class="bg-slate-900 p-5 rounded-[30px] text-center">
                    <p class="text-[9px] text-slate-400 font-bold mb-1">رصيدك</p>
                    <p class="text-2xl font-black text-yellow-500"><span id="uBal">0</span> <small class="text-[10px]">ج.س</small></p>
                </div>
                <div class="bg-blue-600 p-5 rounded-[30px] text-center shadow-lg shadow-blue-200">
                    <p class="text-[9px] text-blue-100 font-bold mb-1">نقاطك ⭐</p>
                    <p class="text-2xl font-black text-white"><span id="uPoints">0</span></p>
                </div>
            </div>
        </div>

        <h3 class="text-sm font-black text-slate-800 mt-10 mb-4 border-r-4 border-yellow-500 pr-2">باقات الشحن</h3>
        <div id="productGrid" class="grid grid-cols-2 gap-3">
            </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // بياناتك (مدمجة بدل الـ JSON)
    const firebaseConfig = { 
        apiKey: "AIzaSyC0jzecEwKgHpxHpTi8Y-_bwwfzVdtgf3E", 
        authDomain: "khasmshop.firebaseapp.com", 
        projectId: "khasmshop", 
        storageBucket: "khasmshop.firebasestorage.app", 
        messagingSenderId: "238182001615", 
        appId: "1:238182001615:web:d77391030a40a481b440ba" 
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const provider = new GoogleAuthProvider();

    // تسجيل الدخول
    document.getElementById('google-login-btn').onclick = () => signInWithPopup(auth, provider);
    document.getElementById('logout-btn').onclick = () => signOut(auth);

    // مراقبة الحالة (Login/Logout)
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            // إخفاء التحميل والدخول، وإظهار المتجر
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('main-app').classList.remove('hidden');

            // جلب بيانات المستخدم من Firestore
            const userRef = doc(db, "users", user.uid);
            onSnapshot(userRef, (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('uName').innerText = user.displayName;
                    document.getElementById('uImg').src = user.photoURL;
                    document.getElementById('uBal').innerText = data.balance || 0;
                    document.getElementById('uPoints').innerText = data.points || 0;
                    document.getElementById('uWallet').innerText = "المحفظة: #" + data.walletID;
                } else {
                    // إنشاء حساب جديد لو أول مرة
                    setDoc(userRef, {
                        name: user.displayName,
                        email: user.email,
                        img: user.photoURL,
                        balance: 0,
                        points: 0,
                        walletID: Math.floor(100000 + Math.random() * 900000)
                    });
                }
            });
        } else {
            document.getElementById('loading-screen').classList.add('hidden');
            document.getElementById('auth-screen').classList.remove('hidden');
            document.getElementById('main-app').classList.add('hidden');
        }
    });
</script>
</body>
</html>
