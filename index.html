<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhasmShop | تسجيل دخول سريع</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { font-family: 'Cairo', sans-serif; margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0f172a; min-height: 100vh; }
        
        /* خلفية متحركة */
        .animated-bg {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: linear-gradient(125deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            background-size: 400% 400%; animation: gradient 15s ease infinite; z-index: -1;
        }
        @keyframes gradient { 0% { background-position: 0% 50%; } 50% { background-position: 100% 50%; } 100% { background-position: 0% 50%; } }
        
        /* تصميم زجاجي */
        .glass {
            background: rgba(255, 255, 255, 0.07);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 30px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }
        
        /* شاشة التحميل */
        #loading-screen {
            position: fixed; inset: 0; z-index: 99999;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            display: none; flex-direction: column; align-items: center; justify-content: center;
        }
        .loader {
            width: 60px; height: 60px;
            border: 5px solid rgba(234, 179, 8, 0.3);
            border-top: 5px solid #eab308;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* شاشة تسجيل الدخول */
        #auth-screen {
            position: fixed; inset: 0; z-index: 10000;
            background: rgba(0, 0, 0, 0.95); backdrop-filter: blur(20px);
            display: flex; align-items: center; justify-content: center;
        }
        
        /* زر تسجيل الدخول */
        .google-btn {
            background: white;
            color: #1e293b;
            transition: all 0.3s;
            border-radius: 40px;
            padding: 16px 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            font-weight: 900;
            font-size: 18px;
            width: 100%;
            box-shadow: 0 10px 30px -5px rgba(234, 179, 8, 0.3);
        }
        .google-btn:hover { transform: translateY(-2px); box-shadow: 0 20px 40px -5px rgba(234, 179, 8, 0.5); }
        .google-btn:active { transform: translateY(2px); }
        
        /* إشعارات */
        #toast {
            position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%);
            background: #1e293b; color: white; padding: 12px 30px;
            border-radius: 50px; font-weight: bold; z-index: 99999;
            display: none; box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
    </style>
</head>
<body>
    <div class="animated-bg"></div>

    <!-- شاشة التحميل -->
    <div id="loading-screen">
        <div class="loader mb-6"></div>
        <p class="text-white font-bold text-xl">جاري تسجيل الدخول...</p>
        <p class="text-white/50 text-sm mt-2">الرجاء الانتظار</p>
    </div>

    <!-- شاشة تسجيل الدخول -->
    <div id="auth-screen">
        <div class="glass p-10 max-w-md w-full mx-4">
            <div class="text-center mb-8">
                <h1 class="text-5xl font-black text-yellow-500 mb-2">KHASM</h1>
                <p class="text-white/60">تسجيل الدخول بحساب Google</p>
            </div>
            
            <button id="google-login-btn" class="google-btn">
                <img src="https://www.google.com/favicon.ico" class="w-6 h-6">
                <span>تسجيل الدخول بـ Google</span>
            </button>
            
            <p class="text-white/40 text-xs text-center mt-6">
                بالدخول أنت توافق على الشروط والأحكام
            </p>
        </div>
    </div>

    <!-- التطبيق الرئيسي -->
    <div id="main-app" class="hidden pb-32">
        <!-- الهيدر -->
        <div class="h-48 bg-gradient-to-r from-slate-900 to-slate-800 rounded-b-[60px] flex items-center justify-center relative">
            <div class="absolute inset-0 bg-black/50"></div>
            <div class="text-center relative z-10">
                <h1 class="text-3xl font-black text-white">KHASM SHOP</h1>
                <p class="text-yellow-500 text-sm">بوابة شحن ببجي - السودان</p>
            </div>
        </div>

        <main class="max-w-md mx-auto px-4">
            <!-- بطاقة المستخدم -->
            <div class="glass p-6 -mt-16 relative z-20">
                <div class="flex items-center gap-4 mb-6">
                    <img id="uImg" class="w-16 h-16 rounded-2xl border-4 border-yellow-500/30" src="https://via.placeholder.com/150">
                    <div class="flex-1">
                        <h2 id="uName" class="font-black text-white text-xl">...</h2>
                        <div id="uWallet" class="text-sm text-yellow-500 bg-yellow-500/20 px-3 py-1 rounded-full inline-block mt-1">المحفظة: #000000</div>
                    </div>
                    <button id="logout-btn" class="px-4 py-2 bg-red-500/20 text-red-500 rounded-xl border border-red-500/30">
                        <i class="fas fa-sign-out-alt ml-1"></i> خروج
                    </button>
                </div>
                
                <div class="grid grid-cols-2 gap-4">
                    <div class="bg-slate-800/50 p-4 rounded-2xl text-center">
                        <p class="text-slate-400 text-sm">الرصيد</p>
                        <p class="text-2xl font-black text-yellow-500"><span id="uBal">0</span> <span class="text-sm">ج.س</span></p>
                    </div>
                    <div class="bg-blue-600/20 p-4 rounded-2xl text-center">
                        <p class="text-blue-300 text-sm">النقاط</p>
                        <p class="text-2xl font-black text-white"><span id="uPoints">0</span> ⭐</p>
                    </div>
                </div>
            </div>

            <!-- قائمة المنتجات السريعة -->
            <div class="mt-8">
                <h3 class="text-white font-black mb-4 text-lg">🛍️ المنتجات</h3>
                <div id="productGrid" class="grid grid-cols-2 gap-4"></div>
            </div>

            <!-- طلباتي -->
            <div class="mt-8">
                <h3 class="text-white font-black mb-4 text-lg">📋 طلباتي</h3>
                <div id="userOrdersList" class="space-y-3"></div>
            </div>
        </main>
    </div>

    <!-- إشعارات -->
    <div id="toast"></div>

    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getFirestore, doc, setDoc, getDoc, collection, query, where, onSnapshot, orderBy, addDoc, updateDoc, increment, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
        import { getAuth, signInWithPopup, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

        // ✅ إعدادات Firebase
        const firebaseConfig = {
            apiKey: "AIzaSyC0jzecEwKgHpxHpTi8Y-_bwwfzVdtgf3E",
            authDomain: "khasmshop.firebaseapp.com",
            projectId: "khasmshop",
            storageBucket: "khasmshop.firebasestorage.app",
            messagingSenderId: "238182001615",
            appId: "1:238182001615:web:4c7ddea335df2111b440ba"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        const auth = getAuth(app);
        const provider = new GoogleAuthProvider();

        // ✅ إعدادات تسجيل الدخول - تظهر شاشة اختيار الحساب دائماً
        provider.setCustomParameters({
            prompt: 'select_account'
        });

        // ✅ قائمة الأدمن
        const ADMINS = ["mhmdfthu98@gmail.com", "muhammedaltaj111@gmail.com", "mohnadyasir43@gmail.com"];
        let userData = null;

        // ✅ دوال مساعدة
        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.style.background = isError ? '#ef4444' : '#10b981';
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 3000);
        }

        // ✅ تسجيل الدخول - يعمل بسرعة وبدون مشاكل
        document.getElementById('google-login-btn').addEventListener('click', async () => {
            const loading = document.getElementById('loading-screen');
            loading.style.display = 'flex';
            
            try {
                // ✅ استخدام signInWithPopup - أسرع طريقة
                const result = await signInWithPopup(auth, provider);
                showToast(`مرحباً ${result.user.displayName}`);
            } catch (error) {
                loading.style.display = 'none';
                
                // ✅ معالجة الأخطاء
                if (error.code === 'auth/popup-blocked') {
                    alert('الرجاء السماح بالنوافذ المنبثقة للموقع');
                } else if (error.code === 'auth/cancelled-popup-request') {
                    // المستخدم ألغى العملية - عادي
                } else {
                    showToast('خطأ: ' + error.message, true);
                }
            }
        });

        // ✅ تسجيل الخروج - سريع ومباشر
        document.getElementById('logout-btn').addEventListener('click', async () => {
            try {
                await signOut(auth);
                showToast('تم تسجيل الخروج');
            } catch (error) {
                showToast('خطأ في تسجيل الخروج', true);
            }
        });

        // ✅ مراقبة حالة المصادقة - سريعة وموثوقة
        onAuthStateChanged(auth, async (user) => {
            const loading = document.getElementById('loading-screen');
            const authScreen = document.getElementById('auth-screen');
            const mainApp = document.getElementById('main-app');

            if (user) {
                try {
                    // ✅ إنشاء أو تحدبيث المستخدم بسرعة
                    const userRef = doc(db, "users", user.uid);
                    const userSnap = await getDoc(userRef);
                    
                    if (!userSnap.exists()) {
                        // ✅ مستخدم جديد - إنشاء حساب
                        await setDoc(userRef, {
                            name: user.displayName,
                            email: user.email,
                            img: user.photoURL,
                            walletID: Math.floor(100000 + Math.random() * 900000).toString(),
                            balance: 100, // ✅ رصيد تجريبي للمستخدمين الجدد
                            points: 0,
                            lastLogin: serverTimestamp(),
                            createdAt: serverTimestamp()
                        });
                        showToast('✅ تم إنشاء حساب جديد');
                    } else {
                        // ✅ مستخدم موجود - تحديث آخر دخول
                        await updateDoc(userRef, { 
                            lastLogin: serverTimestamp() 
                        });
                    }

                    // ✅ إخفاء شاشات التحميل والمصادقة
                    loading.style.display = 'none';
                    authScreen.style.display = 'none';
                    mainApp.classList.remove('hidden');

                    // ✅ بدء تحميل البيانات
                    loadUserData(user.uid);
                    loadProducts();
                    loadUserOrders(user.uid);

                } catch (error) {
                    console.error('خطأ:', error);
                    loading.style.display = 'none';
                    showToast('حدث خطأ في تحميل البيانات', true);
                }
            } else {
                // ✅ العودة لشاشة تسجيل الدخول
                authScreen.style.display = 'flex';
                mainApp.classList.add('hidden');
                loading.style.display = 'none';
                userData = null;
            }
        });

        // ✅ تحميل بيانات المستخدم
        function loadUserData(uid) {
            onSnapshot(doc(db, "users", uid), (doc) => {
                if (doc.exists()) {
                    userData = doc.data();
                    document.getElementById('uName').innerText = userData.name || '...';
                    document.getElementById('uImg').src = userData.img || 'https://via.placeholder.com/150';
                    document.getElementById('uBal').innerText = (userData.balance || 0).toLocaleString();
                    document.getElementById('uPoints').innerText = userData.points || 0;
                    document.getElementById('uWallet').innerText = `المحفظة: #${userData.walletID || '000000'}`;
                }
            });
        }

        // ✅ تحميل المنتجات
        function loadProducts() {
            onSnapshot(collection(db, "products"), (snap) => {
                const grid = document.getElementById('productGrid');
                grid.innerHTML = '';
                
                if (snap.empty) {
                    // ✅ منتجات افتراضية إذا كانت القاعدة فارغة
                    grid.innerHTML = `
                        <div class="glass p-4 text-center col-span-2">
                            <p class="text-white/70">لا توجد منتجات مضافة</p>
                        </div>
                    `;
                    return;
                }
                
                snap.forEach(doc => {
                    const p = doc.data();
                    grid.innerHTML += `
                        <div class="glass p-4 text-center">
                            <p class="font-bold text-white">${p.name}</p>
                            <p class="text-yellow-500 font-bold my-2">${p.price} ج.س</p>
                            <p class="text-xs text-blue-400 mb-2">+${p.givePoints} نقطة</p>
                            <button onclick="buyProduct('${p.name}', ${p.price}, ${p.givePoints})" 
                                    class="w-full bg-gradient-to-r from-yellow-500 to-red-500 text-white py-2 rounded-xl text-sm font-bold">
                                شراء
                            </button>
                        </div>
                    `;
                });
            });
        }

        // ✅ تحميل طلبات المستخدم
        function loadUserOrders(uid) {
            const q = query(
                collection(db, "orders"), 
                where("uID", "==", uid), 
                orderBy("timestamp", "desc")
            );
            
            onSnapshot(q, (snap) => {
                const list = document.getElementById('userOrdersList');
                list.innerHTML = '';
                
                if (snap.empty) {
                    list.innerHTML = '<p class="text-white/50 text-center">لا توجد طلبات سابقة</p>';
                    return;
                }
                
                snap.forEach(doc => {
                    const o = doc.data();
                    const date = o.timestamp ? new Date(o.timestamp.toDate()).toLocaleDateString('ar-EG') : '';
                    const statusColor = o.status === 'مكتمل' ? 'text-green-500' : (o.status === 'فشل' ? 'text-red-500' : 'text-yellow-500');
                    
                    list.innerHTML += `
                        <div class="glass p-4">
                            <div class="flex justify-between items-center">
                                <div>
                                    <p class="font-bold text-white">${o.product}</p>
                                    <p class="text-xs text-white/50">${date}</p>
                                </div>
                                <span class="${statusColor} font-bold">${o.status}</span>
                            </div>
                        </div>
                    `;
                });
            });
        }

        // ✅ شراء منتج
        window.buyProduct = async (name, price, points) => {
            if (!userData) {
                showToast('الرجاء تسجيل الدخول أولاً', true);
                return;
            }
            
            if (userData.balance < price) {
                showToast('الرصيد غير كافٍ', true);
                return;
            }
            
            const gameID = prompt('أدخل ID اللاعب:');
            if (!gameID || !/^\d+$/.test(gameID)) {
                showToast('ID غير صالح', true);
                return;
            }
            
            const phone = prompt('أدخل رقم الهاتف:');
            if (!phone || !/^\d+$/.test(phone)) {
                showToast('رقم الهاتف غير صالح', true);
                return;
            }
            
            try {
                // ✅ خصم الرصيد
                await updateDoc(doc(db, "users", auth.currentUser.uid), {
                    balance: increment(-price)
                });
                
                // ✅ إضافة الطلب
                await addDoc(collection(db, "orders"), {
                    uID: auth.currentUser.uid,
                    uName: userData.name,
                    product: name,
                    price: price,
                    pts: points,
                    gameID: gameID,
                    phone: phone,
                    status: 'قيد الانتظار',
                    timestamp: serverTimestamp()
                });
                
                showToast('✅ تم الشراء بنجاح');
                
            } catch (error) {
                showToast('خطأ: ' + error.message, true);
            }
        };

    </script>
</body>
    </html>
