<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KhasmShop Ultra | متجر الخصم الشامل</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsbarcode/3.11.5/JsBarcode.all.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&display=swap');
        
        :root { --primary: #fbbf24; --dark: #0f172a; }
        body { font-family: 'Cairo', sans-serif; background-color: #f8fafc; user-select: none; -webkit-tap-highlight-color: transparent; }

        .page { display: none; opacity: 0; transform: translateY(10px); transition: all 0.3s ease-out; }
        .page.active { display: block; opacity: 1; transform: translateY(0); }

        .glass { background: rgba(255, 255, 255, 0.85); backdrop-filter: blur(12px); }
        .card-gradient { background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        
        @media print { .no-print { display: none !important; } .print-only { display: block !important; } }
        .print-only { display: none; }

        .btn-hover { transition: transform 0.2s; }
        .btn-hover:active { transform: scale(0.96); }

        #toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); z-index: 9999; display: none; }
        .status-badge { padding: 2px 8px; border-radius: 6px; font-size: 9px; font-weight: 800; }
    </style>
</head>
<body>

<div id="emergency-overlay" class="hidden fixed inset-0 z-[10000] bg-slate-900 flex flex-col items-center justify-center p-8 text-center">
    <i class="fas fa-lock text-5xl text-primary animate-pulse mb-4"></i>
    <h1 class="text-2xl font-black text-white">النظام تحت الصيانة</h1>
</div>

<div id="app-container" class="max-w-md mx-auto min-h-screen relative no-print pb-24">
    
    <header class="glass sticky top-0 z-[100] px-5 py-4 border-b flex justify-between items-center">
        <div class="flex items-center gap-3">
            <img id="user-avatar" class="w-11 h-11 rounded-2xl object-cover border-2 border-primary shadow-sm" src="https://via.placeholder.com/100">
            <div>
                <h2 id="user-display-name" class="font-black text-xs text-slate-800 truncate w-24">تحميل...</h2>
                <span id="user-wallet-id" class="text-[9px] font-bold text-slate-400">#000000</span>
            </div>
        </div>
        <div class="flex gap-2">
            <button onclick="logout()" class="w-9 h-9 rounded-xl bg-red-50 text-red-500 flex items-center justify-center btn-hover"><i class="fas fa-power-off"></i></button>
        </div>
    </header>

    <main class="p-4">
        
        <section id="home-page" class="page active space-y-5">
            <div class="card-gradient rounded-[35px] p-6 text-white shadow-xl relative overflow-hidden">
                <div class="relative z-10">
                    <p class="text-[10px] font-bold opacity-60 mb-1">الرصيد المتاح</p>
                    <div class="flex items-baseline gap-2 mb-4">
                        <h3 id="user-balance" class="text-4xl font-black text-primary">0</h3>
                        <span class="text-xs opacity-60">SDG</span>
                    </div>
                    <div class="flex gap-3">
                        <button onclick="switchTab('transfer-page')" class="flex-1 bg-white/10 hover:bg-white/20 py-2 rounded-xl text-[10px] font-black transition-all">
                            <i class="fas fa-paper-plane ml-1"></i> تحويل رصيد
                        </button>
                        <button onclick="switchTab('orders-page')" class="flex-1 bg-white/10 hover:bg-white/20 py-2 rounded-xl text-[10px] font-black transition-all">
                            <i class="fas fa-shopping-bag ml-1"></i> طلباتي
                        </button>
                    </div>
                </div>
            </div>

            <div class="flex gap-2 overflow-x-auto no-scrollbar py-1">
                <button onclick="changeCategory('PUBG', this)" class="cat-btn active flex-shrink-0 bg-primary text-slate-900 px-6 py-3 rounded-2xl text-[10px] font-black shadow-lg shadow-primary/20">PUBG</button>
                <button onclick="changeCategory('FREEFIRE', this)" class="cat-btn flex-shrink-0 bg-white text-slate-400 px-6 py-3 rounded-2xl text-[10px] font-black border">FREE FIRE</button>
                <button onclick="changeCategory('CLASH', this)" class="cat-btn flex-shrink-0 bg-white text-slate-400 px-6 py-3 rounded-2xl text-[10px] font-black border">CLASH</button>
            </div>
            
            <div id="product-grid" class="grid grid-cols-2 gap-4"></div>
        </section>

        <section id="transfer-page" class="page space-y-6">
            <div class="bg-white p-6 rounded-[30px] shadow-sm border space-y-4">
                <h3 class="font-black text-slate-800 text-sm"><i class="fas fa-exchange-alt ml-2 text-primary"></i> تحويل رصيد سريع</h3>
                <input id="tr-wallet-id" oninput="validateTransferTarget()" type="number" placeholder="رقم محفظة المستلم" class="w-full p-4 rounded-2xl bg-slate-50 border-none text-xs font-bold outline-none">
                <div id="tr-user-preview" class="hidden flex items-center gap-3 p-3 bg-blue-50 rounded-2xl animate-pulse">
                    <img id="tr-prev-img" class="w-8 h-8 rounded-full border border-blue-200">
                    <span id="tr-prev-name" class="text-[10px] font-black text-blue-600"></span>
                </div>
                <input id="tr-amount" type="number" placeholder="المبلغ" class="w-full p-4 rounded-2xl bg-slate-50 border-none text-xs font-bold outline-none">
                <button onclick="handleTransfer()" class="w-full bg-slate-900 text-white py-4 rounded-2xl text-xs font-black btn-hover">تأكيد التحويل الآن</button>
            </div>
        </section>

        <section id="orders-page" class="page space-y-4">
            <h3 class="font-black text-slate-800 px-2">تاريخ مشترياتك</h3>
            <div id="user-orders-list" class="space-y-3"></div>
        </section>

        <section id="admin-page" class="page space-y-6">
            <div class="grid grid-cols-2 gap-3">
                <div class="bg-white p-4 rounded-3xl border text-center">
                    <p class="text-[9px] font-bold text-slate-400">إجمالي المبيعات</p>
                    <h4 id="adm-total-sales" class="text-sm font-black text-green-600">0</h4>
                </div>
                <div class="bg-white p-4 rounded-3xl border text-center">
                    <p class="text-[9px] font-bold text-slate-400">طلبات معلقة</p>
                    <h4 id="adm-pending-count" class="text-sm font-black text-red-600">0</h4>
                </div>
            </div>

            <div class="bg-white p-6 rounded-[30px] border space-y-3">
                <p class="text-[10px] font-black text-primary">إضافة منتج جديد</p>
                <div class="grid grid-cols-2 gap-2">
                    <input id="adm-p-name" type="text" placeholder="الاسم" class="col-span-2 p-3 bg-slate-50 rounded-xl text-[10px] font-bold outline-none border">
                    <input id="adm-p-price" type="number" placeholder="السعر" class="p-3 bg-slate-50 rounded-xl text-[10px] font-bold outline-none border">
                    <select id="adm-p-cat" class="p-3 bg-slate-50 rounded-xl text-[10px] font-bold outline-none border">
                        <option value="PUBG">PUBG</option>
                        <option value="FREEFIRE">FREE FIRE</option>
                    </select>
                </div>
                <button onclick="adminAddProduct()" class="w-full bg-slate-900 text-white py-3 rounded-xl text-[10px] font-black">حفظ المنتج</button>
            </div>

            <div class="space-y-4">
                <h3 class="font-black text-slate-800 text-sm px-2">إدارة طلبات الزبائن</h3>
                <div id="admin-orders-list" class="space-y-3"></div>
            </div>
        </section>

    </main>

    <nav class="fixed bottom-5 left-1/2 -translate-x-1/2 w-[90%] bg-white/90 backdrop-blur-md border shadow-2xl rounded-[30px] p-2 flex justify-around items-center z-[1000]">
        <button onclick="switchTab('home-page', this)" class="nav-item p-3 text-primary transition-all"><i class="fas fa-home text-lg"></i></button>
        <button onclick="switchTab('transfer-page', this)" class="nav-item p-3 text-slate-300 transition-all"><i class="fas fa-exchange-alt text-lg"></i></button>
        <button onclick="switchTab('orders-page', this)" class="nav-item p-3 text-slate-300 transition-all"><i class="fas fa-receipt text-lg"></i></button>
        <button id="admin-nav-btn" onclick="switchTab('admin-page', this)" class="hidden nav-item p-3 text-slate-300 transition-all"><i class="fas fa-user-shield text-lg"></i></button>
    </nav>
</div>

<div id="invoice-template" class="print-only p-10 bg-white text-slate-900 border-4 border-double border-slate-200">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-primary">KHASM SHOP</h1>
        <p class="text-[10px] font-bold text-slate-400">إيصال عملية ناجحة - متجر الخصم</p>
    </div>
    <div class="border-y-2 border-slate-100 py-6 my-6 space-y-3">
        <div class="flex justify-between"><span class="text-xs text-slate-500">اسم العميل:</span> <span id="inv-name" class="text-xs font-black"></span></div>
        <div class="flex justify-between"><span class="text-xs text-slate-500">المنتج:</span> <span id="inv-prod" class="text-xs font-black"></span></div>
        <div class="flex justify-between"><span class="text-xs text-slate-500">آيدي اللاعب:</span> <span id="inv-gid" class="text-xs font-black text-blue-600"></span></div>
        <div class="flex justify-between"><span class="text-xs text-slate-500">التاريخ:</span> <span id="inv-date" class="text-[9px] font-bold"></span></div>
    </div>
    <div class="flex justify-between items-center mb-10">
        <span class="text-lg font-black">الإجمالي:</span>
        <span id="inv-total" class="text-2xl font-black text-primary"></span>
    </div>
    <div class="text-center"><svg id="barcode" class="mx-auto"></svg></div>
</div>

<div id="toast" class="bg-slate-900 text-white px-6 py-3 rounded-full text-[10px] font-bold shadow-2xl animate-bounce"><span id="toast-msg"></span></div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, addDoc, query, where, getDocs, updateDoc, increment, setDoc, serverTimestamp, orderBy, getDoc, runTransaction } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, signInWithRedirect, GoogleAuthProvider, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyC0jzecEwKgHpxHpTi8Y-_bwwfzVdtgf3E",
        authDomain: "khasmshop.firebaseapp.com",
        projectId: "khasmshop",
        storageBucket: "khasmshop.firebasestorage.app",
        messagingSenderId: "238182001615",
        appId: "1:238182001615:web:d77391030a40a481b440ba"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    const ADMINS = ["mhmdfthu98@gmail.com", "muhammedaltaj111@gmail.com", "mohnadyasir43@gmail.com"];
    let currentUserData = null;
    let selectedCat = 'PUBG';

    // 1. المصادقة والبيانات الأساسية
    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userRef = doc(db, "users", user.uid);
            const snap = await getDoc(userRef);
            if (!snap.exists()) {
                await setDoc(userRef, {
                    name: user.displayName, email: user.email, img: user.photoURL,
                    walletID: Math.floor(100000 + Math.random() * 900000).toString(),
                    balance: 0, points: 0, role: ADMINS.includes(user.email) ? "Admin" : "User"
                });
            }
            initApp(user);
        } else { signInWithRedirect(auth, provider); }
    });

    function initApp(user) {
        const isAdmin = ADMINS.includes(user.email);
        if(isAdmin) document.getElementById('admin-nav-btn').classList.remove('hidden');

        onSnapshot(doc(db, "users", user.uid), (snap) => {
            currentUserData = snap.data();
            renderProfile();
        });

        loadProducts();
        loadUserOrders();
        if(isAdmin) loadAdminTools();
    }

    function renderProfile() {
        document.getElementById('user-display-name').innerText = currentUserData.name;
        document.getElementById('user-avatar').src = currentUserData.img;
        document.getElementById('user-balance').innerText = currentUserData.balance.toLocaleString();
        document.getElementById('user-wallet-id').innerText = `#${currentUserData.walletID}`;
    }

    // 2. نظام المتجر
    window.changeCategory = (cat, btn) => {
        selectedCat = cat;
        document.querySelectorAll('.cat-btn').forEach(b => b.classList.replace('bg-primary', 'bg-white'));
        btn.classList.replace('bg-white', 'bg-primary');
        loadProducts();
    };

    function loadProducts() {
        const q = query(collection(db, "products"), where("category", "==", selectedCat), orderBy("price", "asc"));
        onSnapshot(q, (snap) => {
            const grid = document.getElementById('product-grid');
            grid.innerHTML = '';
            snap.forEach(d => {
                const p = d.data();
                grid.innerHTML += `
                <div class="bg-white p-5 rounded-[30px] border relative shadow-sm">
                    <p class="text-[10px] font-black text-slate-700 h-8">${p.name}</p>
                    <div class="text-lg font-black text-blue-600 my-2">${p.price.toLocaleString()} <span class="text-[8px] text-slate-400">SDG</span></div>
                    <button onclick="handlePurchase('${d.id}', '${p.name}', ${p.price})" class="w-full bg-slate-900 text-white py-3 rounded-2xl text-[9px] font-black btn-hover">شراء الآن</button>
                </div>`;
            });
        });
    }

    window.handlePurchase = async (id, name, price) => {
        if(currentUserData.balance < price) return showToast("رصيدك غير كافٍ!");
        const gid = prompt("أدخل آيدي اللاعب (Player ID):");
        if(!gid) return;

        await updateDoc(doc(db, "users", auth.currentUser.uid), { balance: increment(-price) });
        await addDoc(collection(db, "orders"), {
            uID: auth.currentUser.uid, uName: currentUserData.name, 
            product: name, price, gameID: gid, status: 'قيد الانتظار',
            timestamp: serverTimestamp()
        });
        showToast("تم إرسال الطلب بنجاح ✅");
    };

    // 3. نظام التحويل المالي (الميزات الجديدة)
    window.validateTransferTarget = async () => {
        const id = document.getElementById('tr-wallet-id').value;
        const prev = document.getElementById('tr-user-preview');
        if(id.length === 6) {
            const q = query(collection(db, "users"), where("walletID", "==", id));
            const snap = await getDocs(q);
            if(!snap.empty) {
                const u = snap.docs[0].data();
                document.getElementById('tr-prev-name').innerText = u.name;
                document.getElementById('tr-prev-img').src = u.img;
                prev.classList.remove('hidden');
                return;
            }
        }
        prev.classList.add('hidden');
    };

    window.handleTransfer = async () => {
        const id = document.getElementById('tr-wallet-id').value;
        const amount = parseInt(document.getElementById('tr-amount').value);
        if(!amount || amount <= 0 || currentUserData.balance < amount) return showToast("بيانات غير صحيحة أو رصيد غير كافٍ");

        const q = query(collection(db, "users"), where("walletID", "==", id));
        const snap = await getDocs(q);
        if(snap.empty) return showToast("المحفظة غير موجودة");

        const targetRef = doc(db, "users", snap.docs[0].id);
        const myRef = doc(db, "users", auth.currentUser.uid);

        try {
            await runTransaction(db, async (transaction) => {
                transaction.update(myRef, { balance: increment(-amount) });
                transaction.update(targetRef, { balance: increment(amount) });
            });
            showToast("تم التحويل بنجاح 💸");
            document.getElementById('tr-amount').value = '';
        } catch (e) { showToast("فشل التحويل!"); }
    };

    // 4. سجل الطلبات (تاريخ وتفاصيل)
    function loadUserOrders() {
        const q = query(collection(db, "orders"), where("uID", "==", auth.currentUser.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const container = document.getElementById('user-orders-list');
            container.innerHTML = '';
            snap.forEach(d => {
                const o = d.data();
                const date = o.timestamp?.toDate().toLocaleString('ar-EG');
                container.innerHTML += `
                <div class="bg-white p-4 rounded-2xl border shadow-sm">
                    <div class="flex justify-between mb-2">
                        <span class="text-[10px] font-black">${o.product}</span>
                        <span class="status-badge ${o.status === 'قيد الانتظار' ? 'bg-yellow-100 text-yellow-600' : 'bg-green-100 text-green-600'}">${o.status}</span>
                    </div>
                    <div class="text-[9px] text-slate-400 flex justify-between">
                        <span>${date || 'جاري المعالجة...'}</span>
                        <span class="font-black text-slate-700">${o.price} SDG</span>
                    </div>
                </div>`;
            });
        });
    }

    // 5. لوحة الإدارة
    function loadAdminTools() {
        // حساب الإحصائيات
        onSnapshot(collection(db, "orders"), (snap) => {
            let total = 0, pending = 0;
            snap.forEach(d => {
                const o = d.data();
                if(o.status === 'مكتمل') total += o.price;
                if(o.status === 'قيد الانتظار') pending++;
            });
            document.getElementById('adm-total-sales').innerText = total.toLocaleString() + " SDG";
            document.getElementById('adm-pending-count').innerText = pending;
        });

        // قائمة الطلبات للإدارة
        const q = query(collection(db, "orders"), where("status", "==", "قيد الانتظار"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('admin-orders-list');
            list.innerHTML = '';
            snap.forEach(d => {
                const o = d.data();
                list.innerHTML += `
                <div class="bg-white p-5 rounded-[25px] border-2 border-slate-50 shadow-sm space-y-3">
                    <div class="flex justify-between items-center">
                        <span class="text-xs font-black text-blue-600">${o.uName}</span>
                        <span class="text-[9px] text-slate-400 font-bold">${o.timestamp?.toDate().toLocaleString('ar-EG')}</span>
                    </div>
                    <div class="bg-slate-50 p-3 rounded-xl">
                        <p class="text-[10px] font-black">الطلب: ${o.product}</p>
                        <p class="text-[10px] font-black text-red-500 mt-1">ID: ${o.gameID}</p>
                    </div>
                    <div class="flex gap-2">
                    <button onclick="approveOrder('${d.id}', '${o.uID}', '${o.uName}', '${o.product}', '${o.gameID}', ${o.price})" class="flex-1 bg-green-500 text-white py-3 rounded-xl text-[10px] font-black btn-hover shadow-lg shadow-green-100">تنفيذ</button>
                        <button onclick="rejectOrder('${d.id}', '${o.uID}', ${o.price})" class="flex-1 bg-red-50 text-red-500 py-3 rounded-xl text-[10px] font-black btn-hover">رفض</button>
                    </div>
                </div>`;
            });
        });
    }

    // 6. دوال التحكم للمسؤول (الأدمن)
    window.adminAddProduct = async () => {
        const name = document.getElementById('adm-p-name').value;
        const price = parseInt(document.getElementById('adm-p-price').value);
        const cat = document.getElementById('adm-p-cat').value;
        
        if(!name || !price) return showToast("يرجى ملء كافة البيانات");

        try {
            await addDoc(collection(db, "products"), {
                name,
                price,
                category: cat,
                timestamp: serverTimestamp()
            });
            showToast("تمت إضافة المنتج بنجاح ✅");
            document.getElementById('adm-p-name').value = '';
            document.getElementById('adm-p-price').value = '';
        } catch (e) {
            showToast("فشل في إضافة المنتج!");
        }
    };

    window.approveOrder = async (id, uid, name, prod, gid, price) => {
        try {
            // 1. تحديث حالة الطلب
            await updateDoc(doc(db, "orders", id), { status: 'مكتمل' });
            
            // 2. إرسال إشعار (تعديل السجل المالي اختياري هنا)
            showToast("تم تنفيذ الطلب.. جاري استخراج الفاتورة");

            // 3. تعبئة بيانات الفاتورة للطباعة
            document.getElementById('inv-name').innerText = name;
            document.getElementById('inv-prod').innerText = prod;
            document.getElementById('inv-gid').innerText = gid;
            document.getElementById('inv-total').innerText = price.toLocaleString() + " SDG";
            document.getElementById('inv-date').innerText = new Date().toLocaleString('ar-EG');
            
            // 4. توليد الباركود (JsBarcode)
            JsBarcode("#barcode", gid, {
                format: "CODE128",
                width: 1.5,
                height: 40,
                displayValue: true,
                fontSize: 10
            });

            // 5. أمر الطباعة
            setTimeout(() => { window.print(); }, 500);
        } catch (e) {
            showToast("حدث خطأ أثناء التنفيذ!");
        }
    };

    window.rejectOrder = async (id, uid, price) => {
        if(!confirm("هل أنت متأكد من رفض الطلب؟ سيتم إرجاع المبلغ لآلياً لمحفظة العميل.")) return;
        
        try {
            await updateDoc(doc(db, "orders", id), { status: 'مرفوض' });
            // إرجاع المبلغ للعميل
            await updateDoc(doc(db, "users", uid), {
                balance: increment(price)
            });
            showToast("تم رفض الطلب وإرجاع الرصيد بنجاح ↩️");
        } catch (e) {
            showToast("فشل في معالجة الرفض!");
        }
    };

    // 7. أدوات واجهة المستخدم (UI Helpers)
    window.showToast = (msg) => {
        const toast = document.getElementById('toast');
        const msgSpan = document.getElementById('toast-msg');
        msgSpan.innerText = msg;
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 3000);
    };

    window.switchTab = (id, btn) => {
        // إخفاء كل الصفحات
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        // إظهار الصفحة المطلوبة
        document.getElementById(id).classList.add('active');
        
        // تحديث ألوان بار التنقل
        if(btn) {
            document.querySelectorAll('.nav-item').forEach(i => i.classList.replace('text-primary', 'text-slate-300'));
            btn.classList.replace('text-slate-300', 'text-primary');
        }
    };

    window.logout = () => {
        if(confirm("هل تريد تسجيل الخروج؟")) {
            signOut(auth).then(() => location.reload());
        }
    };

    // مراقبة وضع الطوارئ (اختياري من قاعدة البيانات)
    onSnapshot(doc(db, "settings", "store_config"), (snap) => {
        if(snap.exists() && snap.data().emergencyMode === true) {
            if(!ADMINS.includes(auth.currentUser?.email)) {
                document.getElementById('emergency-overlay').classList.remove('hidden');
            }
        } else {
            document.getElementById('emergency-overlay').classList.add('hidden');
        }
    });

</script>
</body>
</html>
