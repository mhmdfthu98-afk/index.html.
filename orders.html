<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>MORRE STORE | طلباتي</title>
    <script src="https://cdn.tailwindcss.com">
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800;900&display=swap');
        * {
            font-family: 'Cairo', sans-serif;
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: linear-gradient(135deg, #fef08a 0%, #fde047 30%, #fef9c3 60%, #fef08a 100%);
            min-height: 100vh;
            overflow-x: hidden;
            padding-bottom: 80px;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            padding: 16px;
        }
        .back-header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0;
            margin-bottom: 8px;
        }
        .back-header .back-btn {
            background: rgba(255,255,255,0.6);
            border: 1px solid rgba(255,255,255,0.3);
            border-radius: 12px;
            padding: 8px 16px;
            color: #1e293b;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.9rem;
        }
        .back-header .back-btn:hover {
            background: rgba(255,255,255,0.8);
        }
        .back-header .page-title {
            font-size: 1.3rem;
            font-weight: 900;
            color: #1e293b;
        }
        .glass-card {
            background: white;
            border-radius: 16px;
            padding: 20px;
            border: 1px solid #f1f5f9;
            margin-bottom: 16px;
            transition: all 0.3s ease;
        }
        .glass-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(0,0,0,0.06);
        }
        .glass-card .card-title {
            font-size: 1rem;
            font-weight: 800;
            color: #1e293b;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .glass-card .card-title i {
            color: #d97706;
        }

        /* تبويبات حالة الطلبات */
        .tabs {
            display: flex;
            gap: 6px;
            flex-wrap: wrap;
            margin-bottom: 16px;
            overflow-x: auto;
            padding-bottom: 4px;
        }
        .tabs .tab-btn {
            padding: 8px 16px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: white;
            color: #64748b;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            white-space: nowrap;
            flex: 1;
            text-align: center;
            min-width: 60px;
        }
        .tabs .tab-btn.active {
            background: #f59e0b;
            color: white;
            border-color: #f59e0b;
        }
        .tabs .tab-btn:hover:not(.active) {
            border-color: #d97706;
        }
        .tabs .tab-btn .count {
            background: rgba(0,0,0,0.1);
            border-radius: 50%;
            padding: 0 6px;
            font-size: 0.6rem;
            margin-right: 4px;
        }
        .tabs .tab-btn.active .count {
            background: rgba(255,255,255,0.3);
        }

        /* بطاقة الطلب */
        .order-card {
            background: #f8fafc;
            border-radius: 12px;
            padding: 14px;
            margin-bottom: 12px;
            border: 1px solid #e2e8f0;
            cursor: pointer;
            transition: 0.2s;
            position: relative;
        }
        .order-card:hover {
            border-color: #d97706;
            transform: translateX(-4px);
        }
        .order-card .order-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            flex-wrap: wrap;
            gap: 8px;
        }
        .order-card .order-id {
            font-weight: 700;
            color: #1e293b;
            font-size: 0.85rem;
        }
        .order-card .order-id .copy-btn {
            color: #94a3b8;
            cursor: pointer;
            font-size: 0.7rem;
            margin-right: 4px;
        }
        .order-card .order-id .copy-btn:hover {
            color: #d97706;
        }
        .order-card .order-date {
            font-size: 0.7rem;
            color: #94a3b8;
        }
        .order-card .order-product {
            display: flex;
            align-items: center;
            gap: 12px;
            margin: 8px 0;
        }
        .order-card .order-product img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: contain;
            background: white;
            padding: 4px;
            border: 1px solid #e2e8f0;
        }
        .order-card .order-product .product-name {
            font-weight: 700;
            color: #1e293b;
            font-size: 0.9rem;
        }
        .order-card .order-product .product-qty {
            font-size: 0.75rem;
            color: #64748b;
        }
        .order-card .order-bottom {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 8px;
            flex-wrap: wrap;
            gap: 6px;
        }
        .order-card .order-price {
            font-weight: 900;
            color: #d97706;
            font-size: 1rem;
        }
        .order-card .order-price small {
            font-size: 0.65rem;
            font-weight: 400;
            color: #94a3b8;
        }
        .order-card .order-payment {
            font-size: 0.7rem;
            color: #64748b;
        }
        .status-badge {
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.65rem;
            font-weight: 700;
            display: inline-block;
        }
        .status-badge.pending { background: #fef3c7; color: #d97706; }
        .status-badge.progress { background: #dbeafe; color: #2563eb; }
        .status-badge.done { background: #d1fae5; color: #059669; }
        .status-badge.cancelled { background: #fee2e2; color: #dc2626; }
        .status-badge.all { background: #f1f5f9; color: #64748b; }

        /* شريط تتبع الطلب */
        .tracking-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin: 16px 0;
            position: relative;
            padding: 0 4px;
        }
        .tracking-bar::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 10%;
            right: 10%;
            height: 3px;
            background: #e2e8f0;
            transform: translateY(-50%);
            z-index: 0;
            border-radius: 4px;
        }
        .tracking-bar .step {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            gap: 4px;
            flex: 1;
        }
        .tracking-bar .step .circle {
            width: 28px;
            height: 28px;
            border-radius: 50%;
            background: #e2e8f0;
            border: 2px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: #94a3b8;
            transition: 0.3s;
        }
        .tracking-bar .step.active .circle {
            background: #f59e0b;
            border-color: #f59e0b;
            color: white;
        }
        .tracking-bar .step.completed .circle {
            background: #059669;
            border-color: #059669;
            color: white;
        }
        .tracking-bar .step .label {
            font-size: 0.5rem;
            color: #94a3b8;
            text-align: center;
            max-width: 50px;
        }
        .tracking-bar .step.active .label {
            color: #d97706;
            font-weight: 700;
        }
        .tracking-bar .step.completed .label {
            color: #059669;
        }

        /* تفاصيل الطلب - مودال */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 99999;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        .modal-overlay.active {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .modal-box h3 {
            font-weight: 900;
            font-size: 1.2rem;
            color: #1e293b;
            margin-bottom: 16px;
            text-align: center;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        .modal-box .close-modal {
            position: sticky;
            top: 0;
            float: left;
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #94a3b8;
            cursor: pointer;
        }
        .modal-box .close-modal:hover {
            color: #1e293b;
        }
        .modal-box .detail-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #f1f5f9;
            font-size: 0.85rem;
        }
        .modal-box .detail-row .label {
            color: #64748b;
            font-weight: 600;
        }
        .modal-box .detail-row .value {
            color: #1e293b;
            font-weight: 700;
        }
        .modal-box .detail-row .value.price {
            color: #d97706;
        }
        .modal-box .detail-actions {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
            margin-top: 16px;
        }
        .modal-box .detail-actions .btn-action {
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #e2e8f0;
            background: #f8fafc;
            font-weight: 700;
            font-size: 0.7rem;
            cursor: pointer;
            transition: 0.2s;
            text-align: center;
            color: #1e293b;
        }
        .modal-box .detail-actions .btn-action:hover {
            border-color: #d97706;
            background: white;
        }
        .modal-box .detail-actions .btn-action i {
            color: #d97706;
            margin-left: 4px;
        }
        .modal-box .detail-actions .btn-action.danger i {
            color: #dc2626;
        }
        .modal-box .detail-actions .btn-action.danger:hover {
            border-color: #dc2626;
        }

        /* تقييم */
        .rating-stars {
            display: flex;
            gap: 6px;
            justify-content: center;
            font-size: 1.5rem;
            cursor: pointer;
            margin: 8px 0;
        }
        .rating-stars i {
            color: #cbd5e1;
            transition: 0.2s;
        }
        .rating-stars i.active {
            color: #f59e0b;
        }

        /* حالة فارغة */
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #64748b;
        }
        .empty-state i {
            font-size: 4rem;
            color: #cbd5e1;
            margin-bottom: 16px;
            display: block;
        }
        .empty-state h3 {
            color: #1e293b;
            font-weight: 800;
            margin-bottom: 8px;
        }
        .empty-state .btn-shop {
            display: inline-block;
            margin-top: 16px;
            padding: 10px 30px;
            background: linear-gradient(135deg, #f59e0b, #d97706);
            color: white;
            font-weight: 800;
            border-radius: 10px;
            text-decoration: none;
            transition: 0.2s;
        }
        .empty-state .btn-shop:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 25px rgba(245,158,11,0.3);
        }

        /* الشريط السفلي */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(12px);
            border-top: 1px solid rgba(0, 0, 0, 0.05);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0 10px 0;
            z-index: 9999;
            box-shadow: 0 -4px 20px rgba(0, 0, 0, 0.08);
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            color: #94a3b8;
            font-size: 0.55rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            padding: 4px 12px;
            border-radius: 12px;
            text-decoration: none;
            border: none;
            background: transparent;
        }
        .bottom-nav .nav-item i {
            font-size: 1.3rem;
            transition: all 0.3s ease;
        }
        .bottom-nav .nav-item span {
            font-size: 0.55rem;
            font-weight: 700;
        }
        .bottom-nav .nav-item.active {
            color: #d97706;
        }
        .bottom-nav .nav-item.active i {
            transform: translateY(-2px);
        }
        .bottom-nav .nav-item:hover {
            color: #d97706;
        }
        @media (max-width: 480px) {
            .bottom-nav .nav-item {
                padding: 4px 6px;
            }
            .bottom-nav .nav-item i {
                font-size: 1.1rem;
            }
            .bottom-nav .nav-item span {
                font-size: 0.45rem;
            }
        }

        /* Dark Mode */
        .dark body {
            background: linear-gradient(135deg, #1e293b 0%, #0f172a 100%);
        }
        .dark .glass-card {
            background: #1e293b;
            border-color: #334155;
        }
        .dark .glass-card .card-title {
            color: #f1f5f9;
        }
        .dark .back-header .page-title {
            color: #f1f5f9;
        }
        .dark .back-header .back-btn {
            background: rgba(30,41,59,0.6);
            color: #f1f5f9;
            border-color: #334155;
        }
        .dark .back-header .back-btn:hover {
            background: rgba(30,41,59,0.8);
        }
        .dark .tabs .tab-btn {
            background: #1e293b;
            border-color: #334155;
            color: #94a3b8;
        }
        .dark .tabs .tab-btn.active {
            background: #f59e0b;
            color: #1e293b;
        }
        .dark .order-card {
            background: #0f172a;
            border-color: #334155;
        }
        .dark .order-card .order-id {
            color: #f1f5f9;
        }
        .dark .order-card .order-product .product-name {
            color: #f1f5f9;
        }
        .dark .order-card .order-price {
            color: #fbbf24;
        }
        .dark .modal-box {
            background: #1e293b;
        }
        .dark .modal-box h3 {
            color: #f1f5f9;
        }
        .dark .modal-box .close-modal {
            color: #94a3b8;
        }
        .dark .modal-box .close-modal:hover {
            color: #f1f5f9;
        }
        .dark .modal-box .detail-row {
            border-color: #334155;
        }
        .dark .modal-box .detail-row .label {
            color: #94a3b8;
        }
        .dark .modal-box .detail-row .value {
            color: #f1f5f9;
        }
        .dark .modal-box .detail-actions .btn-action {
            background: #0f172a;
            border-color: #334155;
            color: #f1f5f9;
        }
        .dark .modal-box .detail-actions .btn-action:hover {
            border-color: #d97706;
        }
        .dark .bottom-nav {
            background: rgba(30,41,59,0.95);
            border-top-color: rgba(255,255,255,0.05);
        }
        .dark .bottom-nav .nav-item {
            color: #64748b;
        }
        .dark .bottom-nav .nav-item.active {
            color: #fbbf24;
        }
        .dark .empty-state h3 {
            color: #f1f5f9;
        }
        .dark .empty-state i {
            color: #475569;
        }
        .dark .status-badge.pending { background: #78350f; color: #fbbf24; }
        .dark .status-badge.progress { background: #1e3a5f; color: #60a5fa; }
        .dark .status-badge.done { background: #064e3b; color: #34d399; }
        .dark .status-badge.cancelled { background: #7f1d1d; color: #f87171; }

        .toast {
            position: fixed;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #1e293b;
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-size: 0.8rem;
            font-weight: 600;
            z-index: 999999;
            opacity: 0;
            transition: 0.3s;
            pointer-events: none;
            white-space: nowrap;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
        .dark .toast {
            background: #f1f5f9;
            color: #1e293b;
        }

        /* المؤقت */
        .order-timer {
            font-size: 0.65rem;
            color: #94a3b8;
            display: flex;
            align-items: center;
            gap: 4px;
        }
        .order-timer i {
            color: #d97706;
        }
    </style>
</head>
<body>

    <div class="container">

        <!-- ===== رأس الصفحة ===== -->
        <div class="back-header">
            <a href="/" class="back-btn">
                <i class="fas fa-arrow-right"></i> رجوع
            </a>
            <div class="page-title">📦 طلباتي</div>
        </div>

        <!-- ===== تبويبات الحالة ===== -->
        <div class="glass-card" style="padding: 12px 16px;">
            <div class="tabs" id="statusTabs">
                <button class="tab-btn active" data-status="all">📋 جميع <span class="count" id="countAll">0</span></button>
                <button class="tab-btn" data-status="pending">⏳ قيد المراجعة <span class="count" id="countPending">0</span></button>
                <button class="tab-btn" data-status="progress">⚡ قيد التنفيذ <span class="count" id="countProgress">0</span></button>
                <button class="tab-btn" data-status="done">✅ مكتمل <span class="count" id="countDone">0</span></button>
                <button class="tab-btn" data-status="cancelled">❌ ملغي <span class="count" id="countCancelled">0</span></button>
            </div>
        </div>

        <!-- ===== قائمة الطلبات ===== -->
        <div id="ordersList">
            <!-- سيتم عرض الطلبات هنا عبر JavaScript -->
        </div>

    </div>

    <!-- ===== مودال تفاصيل الطلب ===== -->
    <div class="modal-overlay" id="orderDetailModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeOrderDetail()">&times;</button>
            <h3>📄 تفاصيل الطلب</h3>
            <div id="orderDetailContent">
                <!-- يتم تعبئته عبر JavaScript -->
            </div>
        </div>
    </div>

    <!-- ===== مودال تقييم الطلب ===== -->
    <div class="modal-overlay" id="ratingModal">
        <div class="modal-box">
            <button class="close-modal" onclick="closeRatingModal()">&times;</button>
            <h3>⭐ تقييم الطلب</h3>
            <div style="text-align:center;margin-bottom:12px;">
                <p style="color:#64748b;font-size:0.85rem;">كيف تقيم تجربتك مع هذا الطلب؟</p>
                <div class="rating-stars" id="ratingStars">
                    <i class="fas fa-star" data-value="1" onclick="setRating(1)"></i>
                    <i class="fas fa-star" data-value="2" onclick="setRating(2)"></i>
                    <i class="fas fa-star" data-value="3" onclick="setRating(3)"></i>
                    <i class="fas fa-star" data-value="4" onclick="setRating(4)"></i>
                    <i class="fas fa-star" data-value="5" onclick="setRating(5)"></i>
                </div>
                <div style="color:#94a3b8;font-size:0.8rem;" id="ratingText">اختر التقييم</div>
            </div>
            <textarea id="ratingFeedback" placeholder="📝 اكتب ملاحظاتك عن الطلب..." style="width:100%;padding:10px;border-radius:10px;border:1px solid #e2e8f0;background:#f8fafc;font-family:'Cairo',sans-serif;resize:vertical;min-height:60px;margin-bottom:12px;"></textarea>
            <button class="btn-primary" onclick="submitRating()" style="width:100%;padding:12px;background:linear-gradient(135deg,#f59e0b,#d97706);color:white;font-weight:800;border:none;border-radius:10px;cursor:pointer;">✅ إرسال التقييم</button>
        </div>
    </div>

    <!-- ===== الشريط السفلي ===== -->
    <div class="bottom-nav">
        <a href="/" class="nav-item">
            <i class="fas fa-home"></i>
            <span>الرئيسية</span>
        </a>
        <a href="#" onclick="window.location.href='support.html'" class="nav-item">
            <i class="fas fa-headset"></i>
            <span>الدعم</span>
        </a>
        <a href="orders.html" class="nav-item active">
            <i class="fas fa-box"></i>
            <span>طلباتي</span>
        </a>
        <a href="account.html" class="nav-item">
            <i class="fas fa-user"></i>
            <span>الحساب</span>
        </a>
    </div>

    <!-- ===== Toast ===== -->
    <div id="toast" class="toast"></div>

    <script type="module">
        // ========== استيراد Firebase ==========
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, collection, query, where, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyC0jzecEwKgHpxHpTi8Y-_bwwfzVdtgf3E",
            authDomain: "khasmshop.firebaseapp.com",
            projectId: "khasmshop",
            storageBucket: "khasmshop.firebasestorage.app",
            messagingSenderId: "238182001615",
            appId: "1:238182001615:web:d77391030a40a481b440ba"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        // ========== بيانات المستخدم ==========
        let currentUser = null;
        let allOrders = [];
        let currentFilter = 'all';
        let selectedOrderId = null;
        let selectedRating = 0;

        // ========== صور الفئات ==========
        const categoryImages = {
            pubg: 'https://i.ibb.co/20tqyP6s/4ff592f1-0de2-421f-bd99-514dd525d512.png',
            freefire: 'https://i.ibb.co/LMh98T2/4bf2c240-db85-47c5-b211-3d0a5cf192df.png',
            clash: 'https://i.ibb.co/ZpS1L23Z/71ce3435-2342-43ff-aad3-0f65c7e6e837.png',
            efootball: 'https://i.ibb.co/RkCSn7yX/a7934c4c-ed36-4662-b9cc-7bc04c57abf3.png',
            netflix: 'https://i.ibb.co/HTqk43z8/4054fb24-7c84-445b-b62e-c15d5ed4fe8b.png',
            googleplay: 'https://i.ibb.co/LhNr3W7Y/f0bf22d7-2b70-419a-8c74-898d8a251e56.png',
            redotpay: 'https://i.ibb.co/ksqdJcgH/e96c9669-6446-4942-b760-a507d492a2b8.png',
            tiktok: 'https://i.ibb.co/j93NWK9T/f74413af-29eb-4da4-917d-e347c7698ed7.png',
            ai: 'https://i.ibb.co/zVDbcgnW/c8f040a9-48ad-4e5e-8203-f941fbf94ad6.png'
        };

        // ========== عرض الطلبات ==========
        function renderOrders(orders) {
            const container = document.getElementById('ordersList');
            
            if (!orders || orders.length === 0) {
                container.innerHTML = `
                    <div class="glass-card empty-state">
                        <i class="fas fa-box-open"></i>
                        <h3>📭 ليس لديك أي طلبات حالياً</h3>
                        <p style="color:#64748b;font-size:0.9rem;">ابدأ بالتسوق لإضافة أول طلب لك</p>
                        <a href="/" class="btn-shop">🛍️ الذهاب إلى المتجر</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = orders.map(order => {
                const statusMap = {
                    'قيد الانتظار': 'pending',
                    'قيد المراجعة': 'pending',
                    'جاري التنفيذ': 'progress',
                    'مكتمل': 'done',
                    'ملغي': 'cancelled',
                    'فشل': 'cancelled'
                };
                const statusClass = statusMap[order.status] || 'pending';
                const statusLabels = {
                    'pending': '⏳ قيد المراجعة',
                    'progress': '⚡ جاري التنفيذ',
                    'done': '✅ مكتمل',
                    'cancelled': '❌ ملغي'
                };
                
                const image = categoryImages[order.game] || 'https://via.placeholder.com/50';
                const date = order.timestamp?.toDate ? new Date(order.timestamp.toDate()).toLocaleString('ar-SD') : 'غير محدد';
                const orderId = order.id || '#' + Math.random().toString(36).substr(2, 8).toUpperCase();

                return `
                    <div class="order-card" onclick="openOrderDetail('${order.id}')">
                        <div class="order-header">
                            <div class="order-id">
                                #${orderId.substring(0, 8)}
                                <span class="copy-btn" onclick="event.stopPropagation(); copyOrderId('${orderId}')">
                                    <i class="fas fa-copy"></i>
                                </span>
                            </div>
                            <span class="status-badge ${statusClass}">${statusLabels[statusClass] || order.status}</span>
                        </div>
                        <div class="order-product">
                            <img src="${image}" alt="${order.product}">
                            <div>
                                <div class="product-name">${order.product}</div>
                                <div class="product-qty">🆔 ${order.gameID || 'غير محدد'}</div>
                            </div>
                        </div>
                        <div class="order-bottom">
                            <div>
                                <div class="order-price">${(order.price || 0).toLocaleString()} <small>ج.س</small></div>
                                <div class="order-payment">💳 ${order.paymentMethod || 'رصيد المحفظة'}</div>
                            </div>
                            <div class="order-date">${date}</div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        // ========== تحديث العدادات ==========
        function updateCounts(orders) {
            const counts = {
                all: orders.length,
                pending: orders.filter(o => o.status === 'قيد الانتظار' || o.status === 'قيد المراجعة').length,
                progress: orders.filter(o => o.status === 'جاري التنفيذ').length,
                done: orders.filter(o => o.status === 'مكتمل').length,
                cancelled: orders.filter(o => o.status === 'ملغي' || o.status === 'فشل').length
            };

            document.getElementById('countAll').textContent = counts.all;
            document.getElementById('countPending').textContent = counts.pending;
            document.getElementById('countProgress').textContent = counts.progress;
            document.getElementById('countDone').textContent = counts.done;
            document.getElementById('countCancelled').textContent = counts.cancelled;

            return counts;
        }

        // ========== تصفية الطلبات ==========
        function filterOrders(status) {
            currentFilter = status;
            let filtered = allOrders;
            
            if (status === 'pending') {
                filtered = allOrders.filter(o => o.status === 'قيد الانتظار' || o.status === 'قيد المراجعة');
            } else if (status === 'progress') {
                filtered = allOrders.filter(o => o.status === 'جاري التنفيذ');
            } else if (status === 'done') {
                filtered = allOrders.filter(o => o.status === 'مكتمل');
            } else if (status === 'cancelled') {
                filtered = allOrders.filter(o => o.status === 'ملغي' || o.status === 'فشل');
            }
            
            renderOrders(filtered);
        }

        // ========== جلب الطلبات من Firebase ==========
        function loadOrders(uid) {
            const q = query(
                collection(db, "orders"),
                where("uID", "==", uid),
                orderBy("timestamp", "desc")
            );

            onSnapshot(q, (snapshot) => {
                allOrders = [];
                snapshot.forEach(doc => {
                    allOrders.push({ id: doc.id, ...doc.data() });
                });
                
                updateCounts(allOrders);
                filterOrders(currentFilter);
            }, (error) => {
                console.error("Error loading orders:", error);
                showToast('❌ حدث خطأ في تحميل الطلبات');
            });
        }

        // ========== فتح تفاصيل الطلب ==========
        window.openOrderDetail = async function(orderId) {
            selectedOrderId = orderId;
            const order = allOrders.find(o => o.id === orderId);
            if (!order) {
                showToast('❌ الطلب غير موجود');
                return;
            }

            const modal = document.getElementById('orderDetailModal');
            const content = document.getElementById('orderDetailContent');

            const statusMap = {
                'قيد الانتظار': 'pending',
                'قيد المراجعة': 'pending',
                'جاري التنفيذ': 'progress',
                'مكتمل': 'done',
                'ملغي': 'cancelled',
                'فشل': 'cancelled'
            };
            const statusClass = statusMap[order.status] || 'pending';
            const statusLabels = {
                'pending': '⏳ قيد المراجعة',
                'progress': '⚡ جاري التنفيذ',
                'done': '✅ مكتمل',
                'cancelled': '❌ ملغي'
            };

            const date = order.timestamp?.toDate ? new Date(order.timestamp.toDate()).toLocaleString('ar-SD') : 'غير محدد';
            const image = categoryImages[order.game] || 'https://via.placeholder.com/80';

            // تحديد مراحل التتبع
            const steps = [
                { key: 'received', label: 'تم الاستلام' },
                { key: 'review', label: 'قيد المراجعة' },
                { key: 'executing', label: 'جاري التنفيذ' },
                { key: 'delivered', label: 'تم التسليم' }
            ];

            let currentStep = 0;
            if (order.status === 'قيد الانتظار' || order.status === 'قيد المراجعة') currentStep = 0;
            else if (order.status === 'جاري التنفيذ') currentStep = 2;
            else if (order.status === 'مكتمل') currentStep = 3;
            else if (order.status === 'ملغي' || order.status === 'فشل') currentStep = -1;

            const trackingHTML = currentStep === -1 ? 
                '<div style="text-align:center;color:#dc2626;font-weight:700;padding:10px;">❌ تم إلغاء الطلب</div>' :
                `
                <div class="tracking-bar">
                    ${steps.map((step, index) => `
                        <div class="step ${index <= currentStep ? (index < currentStep ? 'completed' : 'active') : ''}">
                            <div class="circle">${index < currentStep ? '✓' : index === currentStep ? '●' : ''}</div>
                            <div class="label">${step.label}</div>
                        </div>
                    `).join('')}
                </div>
            `;

            const isCompleted = order.status === 'مكتمل';

            content.innerHTML = `
                <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;padding-bottom:12px;border-bottom:1px solid #f1f5f9;">
                    <img src="${image}" style="width:60px;height:60px;border-radius:8px;object-fit:contain;background:#f8fafc;padding:4px;border:1px solid #e2e8f0;">
                    <div>
                        <div style="font-weight:700;color:#1e293b;font-size:1rem;">${order.product}</div>
                        <span class="status-badge ${statusClass}">${statusLabels[statusClass] || order.status}</span>
                    </div>
                </div>

                ${trackingHTML}

                <div style="margin-top:12px;">
                    <div class="detail-row">
                        <span class="label">📋 رقم الطلب</span>
                        <span class="value">#${(order.id || '').substring(0, 12)}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">📦 المنتج</span>
                        <span class="value">${order.product}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">🎮 اللعبة</span>
                        <span class="value">${order.game || 'غير محدد'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">🆔 أيدي اللاعب</span>
                        <span class="value">${order.gameID || 'غير محدد'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">💰 السعر</span>
                        <span class="value price">${(order.price || 0).toLocaleString()} ج.س</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">💳 طريقة الدفع</span>
                        <span class="value">${order.paymentMethod || 'رصيد المحفظة'}</span>
                    </div>
                    <div class="detail-row">
                        <span class="label">📅 تاريخ الطلب</span>
                        <span class="value">${date}</span>
                    </div>
                    ${order.realName ? `
                    <div class="detail-row">
                        <span class="label">👤 الاسم الحقيقي</span>
                        <span class="value">${order.realName}</span>
                    </div>
                    ` : ''}
                    ${order.whatsapp ? `
                    <div class="detail-row">
                        <span class="label">📱 واتساب</span>
                        <span class="value">${order.whatsapp}</span>
                    </div>
                    ` : ''}
                    ${order.adminNote ? `
                    <div class="detail-row">
                        <span class="label">📝 ملاحظات الإدارة</span>
                        <span class="value" style="color:#d97706;">${order.adminNote}</span>
                    </div>
                    ` : ''}
                </div>

                <div class="detail-actions">
                    <button class="btn-action" onclick="copyOrderId('${order.id}')">
                        <i class="fas fa-copy"></i> نسخ رقم الطلب
                    </button>
                    <button class="btn-action" onclick="downloadInvoice('${order.id}')">
                        <i class="fas fa-file-pdf"></i> تحميل الفاتورة
                    </button>
                    <button class="btn-action" onclick="reorder('${order.id}')">
                        <i class="fas fa-redo"></i> إعادة الشراء
                    </button>
                    <button class="btn-action" onclick="contactSupport('${order.id}')">
                        <i class="fas fa-headset"></i> التواصل مع الدعم
                    </button>
                    ${isCompleted ? `
                    <button class="btn-action" onclick="openRatingModal('${order.id}')" style="grid-column: span 2;">
                        <i class="fas fa-star"></i> تقييم الطلب
                    </button>
                    ` : ''}
                </div>
            `;

            modal.classList.add('active');
        };

        // ========== إغلاق تفاصيل الطلب ==========
        window.closeOrderDetail = function() {
            document.getElementById('orderDetailModal').classList.remove('active');
        };

        // ========== نسخ رقم الطلب ==========
        window.copyOrderId = function(orderId) {
            navigator.clipboard.writeText(orderId).then(() => {
                showToast('✅ تم نسخ رقم الطلب');
            }).catch(() => {
                showToast('📋 رقم الطلب: ' + orderId);
            });
        };

        // ========== تحميل الفاتورة ==========
        window.downloadInvoice = function(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) { showToast('❌ الطلب غير موجود'); return; }
            
            const date = order.timestamp?.toDate ? new Date(order.timestamp.toDate()).toLocaleString('ar-SD') : 'غير محدد';
            const text = `
                ================================
                    MORRE STORE - فاتورة
                ================================
                رقم الطلب: #${orderId.substring(0, 12)}
                المنتج: ${order.product}
                السعر: ${(order.price || 0).toLocaleString()} ج.س
                طريقة الدفع: ${order.paymentMethod || 'رصيد المحفظة'}
                التاريخ: ${date}
                الحالة: ${order.status}
                ================================
                شكراً لتسوقك معنا!
                www.morrestore.com
            `;
            
            const blob = new Blob([text], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `invoice-${orderId.substring(0, 8)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
            showToast('✅ تم تحميل الفاتورة');
        };

        // ========== إعادة الشراء ==========
        window.reorder = function(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            if (!order) { showToast('❌ الطلب غير موجود'); return; }
            showToast('🔄 جاري إعادة توجيهك لشراء ' + order.product);
            setTimeout(() => {
                window.location.href = '/';
            }, 1500);
        };

        // ========== التواصل مع الدعم ==========
        window.contactSupport = function(orderId) {
            const order = allOrders.find(o => o.id === orderId);
            const msg = `مرحباً، أريد استفساراً بخصوص طلبي رقم: ${orderId.substring(0, 8)} - المنتج: ${order?.product || ''}`;
            window.open(`https://wa.me/2490991305468?text=${encodeURIComponent(msg)}`, '_blank');
        };

        // ========== فتح مودال التقييم ==========
        window.openRatingModal = function(orderId) {
            selectedOrderId = orderId;
            selectedRating = 0;
            document.querySelectorAll('#ratingStars i').forEach(star => star.classList.remove('active'));
            document.getElementById('ratingText').textContent = 'اختر التقييم';
            document.getElementById('ratingFeedback').value = '';
            document.getElementById('ratingModal').classList.add('active');
            closeOrderDetail();
        };

        window.closeRatingModal = function() {
            document.getElementById('ratingModal').classList.remove('active');
        };

        // ========== نظام التقييم ==========
        window.setRating = function(value) {
            selectedRating = value;
            const stars = document.querySelectorAll('#ratingStars i');
            stars.forEach((star, index) => {
                star.classList.toggle('active', index < value);
            });
            const texts = ['', '⭐ سيء جداً', '⭐ سيء', '⭐⭐⭐ جيد', '⭐⭐⭐⭐ ممتاز', '⭐⭐⭐⭐⭐ ممتاز جداً'];
            document.getElementById('ratingText').textContent = texts[value] || 'اختر التقييم';
        };

        window.submitRating = function() {
            if (selectedRating === 0) {
                showToast('❌ يرجى اختيار تقييم أولاً');
                return;
            }
            const feedback = document.getElementById('ratingFeedback').value.trim();
            const stars = ['⭐', '⭐', '⭐⭐⭐', '⭐⭐⭐⭐', '⭐⭐⭐⭐⭐'];
            showToast(`✅ شكراً لتقييمك ${stars[selectedRating-1]}${feedback ? ' مع ملاحظاتك' : ''}`);
            closeRatingModal();
        };

        // ========== Toast ==========
        function showToast(msg) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toast._timeout);
            toast._timeout = setTimeout(() => toast.classList.remove('show'), 3000);
        }
        window.showToast = showToast;

        // ========== أحداث التبويبات ==========
        document.querySelectorAll('.tabs .tab-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                document.querySelectorAll('.tabs .tab-btn').forEach(b => b.classList.remove('active'));
                this.classList.add('active');
                filterOrders(this.dataset.status);
            });
        });

        // ========== إغلاق المودالات ==========
        document.getElementById('orderDetailModal').addEventListener('click', function(e) {
            if (e.target === this) closeOrderDetail();
        });
        document.getElementById('ratingModal').addEventListener('click', function(e) {
            if (e.target === this) closeRatingModal();
        });

        // ========== تشغيل الصفحة ==========
        onAuthStateChanged(auth, (user) => {
            if (user) {
                currentUser = user;
                loadOrders(user.uid);
            } else {
                showToast('❌ يرجى تسجيل الدخول أولاً');
                setTimeout(() => {
                    window.location.href = '/';
                }, 1500);
            }
        });

        // ========== تفعيل الوضع الليلي ==========
        if (localStorage.getItem('theme') === 'dark') {
            document.documentElement.classList.add('dark');
        }
    </script>

</body>
</html>
